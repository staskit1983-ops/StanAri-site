<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>STAN ARI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
    }

    button {
      padding: 15px 25px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #4285F4, #34A853);
      color: white;
      margin-top: 20px;
      width: 100%;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="card">
    <h1>Авторизація</h1>
    <p>Увійди через Google щоб отримати доступ</p>

    <button onclick="loginWithGoogle()">
      🔵 Увійти через Google
    </button>
  </div>

  <div class="card">
    <h1>Промокод</h1>
    <input placeholder="Введи код..." />
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsrWuWCILNHKy8jphyvszge7XWUbPwFdY",
    authDomain: "stanari-platform.firebaseapp.com",
    projectId: "stanari-platform",
    storageBucket: "stanari-platform.firebasestorage.app",
    messagingSenderId: "1083904103961",
    appId: "1:1083904103961:web:cd1fec10d11096c8f3fc88"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.loginWithGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;

      alert("Успішний вхід: " + user.email);

      console.log(user);

    } catch (error) {
      console.error(error);
      alert("Помилка входу");
    }
  };
</script>

</body>
</html>
