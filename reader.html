<!DOCTYPE html>
<html lang="uk" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="google" content="notranslate">
<title>STAN ARI — Online Reader</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#050403;color:#fff8ec;font-family:Georgia,serif;overflow:hidden}
body{display:flex;flex-direction:column}
header{
  height:68px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:0 18px;
  background:linear-gradient(180deg,rgba(13,9,6,.98),rgba(7,5,3,.98));
  border-bottom:1px solid rgba(216,175,99,.25);
}
.logo{font-size:13px;letter-spacing:.28em;font-weight:900;white-space:nowrap}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
button,a{
  min-height:40px;
  border-radius:999px;
  border:1px solid rgba(216,175,99,.35);
  background:rgba(255,255,255,.05);
  color:#fff8ec;
  padding:0 14px;
  text-decoration:none;
  font-weight:800;
  cursor:pointer;
  font-family:Georgia,serif;
}
button.active{
  background:linear-gradient(135deg,#fff0bc,#d8af63,#a87531);
  color:#120c06;
  border-color:transparent;
}
.reader{flex:1;min-height:0;background:#111}
iframe{width:100%;height:100%;border:0;background:#111;display:block}
.status{
  height:36px;flex-shrink:0;
  display:flex;align-items:center;
  padding:0 18px;
  background:#090604;
  color:#f4d996;
  font-size:13px;
  border-bottom:1px solid rgba(216,175,99,.15);
}
@media(max-width:620px){
  header{height:auto;min-height:74px;display:grid;grid-template-columns:1fr;align-items:start;padding:10px 12px}
  .controls{justify-content:flex-start}
  button,a{min-height:38px;padding:0 12px;font-size:13px}
  .logo{font-size:12px}
}
</style>
</head>
<body>

<header>
  <div class="logo">STAN ARI</div>
  <div class="controls">
    <button class="active" data-lang="ua">UA</button>
    <button data-lang="en">EN</button>
    <button data-lang="pl">PL</button>
    <a href="index.html">← Сайт</a>
  </div>
</header>

<div class="status" id="status">THE LIFE OPERATOR · UA</div>

<section class="reader">
  <iframe id="pdfFrame" src="https://drive.google.com/file/d/1_ouATgmrx27VKYMuy0XLRAhEfqgU2p5e/preview" allow="autoplay"></iframe>
</section>

<script>
const PDFS = {
  ua: "https://drive.google.com/file/d/1_ouATgmrx27VKYMuy0XLRAhEfqgU2p5e/preview",
  en: "https://drive.google.com/file/d/1S-g6dWz6Qz7PP8dg7wPxoy1ez5KqVYom/preview",
  pl: "https://drive.google.com/file/d/14vQGM3aGgZkpCg2GT07UTGjzHDs6zO9W/preview"
};

const TITLES = {
  ua: "THE LIFE OPERATOR · UA",
  en: "THE LIFE OPERATOR · EN",
  pl: "THE LIFE OPERATOR · PL"
};

const frame = document.getElementById("pdfFrame");
const status = document.getElementById("status");

function openLang(lang){
  if(!PDFS[lang]) lang = "ua";
  localStorage.setItem("stanari_reader_lang", lang);
  frame.src = PDFS[lang];
  status.textContent = TITLES[lang];
  document.querySelectorAll("button[data-lang]").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });
}

document.querySelectorAll("button[data-lang]").forEach(btn => {
  btn.addEventListener("click", () => openLang(btn.dataset.lang));
});

openLang(localStorage.getItem("stanari_reader_lang") || "ua");
</script>

</body>
</html>
