:\nwhat is sleep?\nWhere was I during those five kilometres?\nWho was driving?\n···\nWhen you enter the dream phase —\nthe brain activates a mechanism called muscle atonia.\nTemporary paralysis.\nBecause the experience you have in a dream\nis so real to the nervous system —\nthat if the body weren't switched off\nyou would start physically acting out the movements.\nThat night the atonia didn't trigger.\nBecause my hands already knew what to do —\neighteen hours behind the wheel\nburned into the body as reflex.\nThe body continued the program.\nThe brain drove on in its own world.\nStephen LaBerge at Stanford University proved\nthat during REM sleep\nthe brain is almost as active as during waking.\nEach phase performs its own function:\nmemory consolidation, tissue repair, emotional processing.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 115, "text": "Science says:\nthe brain sees no difference\nbetween a real experience and a dream\nat the level of neural connections.\nSo who are we to claim\nthis world is the only truth?\n· · ·\nDream interpretation.\nYou've heard of it.\nAn ancient system where every image in a dream carries\nmeaning.\nWater — change is coming.\nTeeth — loss.\nA bird — news.\nI always thought this was superstition.\nBut then I stopped and asked:\nwhere did it come from?\nAncient Egypt interpreted dreams.\nAncient Greece. China. Babylon. India.\nand all of them arrived at the same idea:\ndreams carry information.\nAnd beyond that —\nthe same images mean similar things\nat opposite ends of the world.\nHow?\nDifferent civilisations, different languages, different gods —\nWhy does water in a dream mean emotions or change\nin almost every culture?\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 116, "text": "Why does falling mean anxiety?\nWhy does flight mean freedom or longing?\nNobody passed this dictionary around.\nPeople lived on different continents\nwith no knowledge of each other —\nand arrived at similar meanings.\nJung called this the collective unconscious —\na layer of the psyche shared by all of humanity.\nArchetypes.\nSymbols coded into us deeper than language or culture.\nI think about it differently.\nIf a person is a receiver —\nand if there is an information field we have access to —\nthen sleep is the moment when the antenna is most open.\nNo daytime noise. No control.\nThe system starts receiving\nwhat gets drowned out during the day.\nA dream dictionary isn't superstition.\nIt's an attempt to compile the vocabulary of that field.\nPossibly inaccurate.\nPossibly distorted through generations of retelling.\nBut the underlying idea — no longer seems absurd.\nSome people call it God.\nSome — the collective unconscious.\nSome — an information field.\nSometimes I think of it as a server —\na vast database where everything\nthat has ever happened, been felt, been thought,\nis recorded.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 117, "text": "And every person is a client of that server.\nWith different levels of access.\nThe name doesn't matter.\nWhat matters:\nif that server exists —\nWhen the daytime noise has quieted\nand the system can receive\nwhat otherwise gets drowned out.\nthen sleep is the moment when the connection is most stable.\n· · ·\nMendeleev saw his periodic table in a dream.\nPaul McCartney woke up with Yesterday in his head —\nand spent weeks asking people around him\nif they knew the melody,\nbecause he was sure it belonged to someone else.\nNiels Bohr saw the model of the atom in a dream.\nThe default mode network during sleep\nintegrates scattered fragments of experience.\nHypnagogia — the state between sleep and waking —\nThis is documented.\nAfter that night with the officer —\nI went on ignoring sleep for years.\nI'd go to bed at three, wake at seven,\nand by nine I had nothing left.\nI thought that was strength of character.\nThat strong people sleep less.\n2017.\nThe Nobel Prize in Physiology —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 118, "text": "was deliberately used by Edison and Dalí for creative ideas.\nJeffrey Hall, Michael Rosbash, Michael Young.\nFor discovering the molecular mechanism\nof circadian rhythms.\nThe conclusion was simple and blunt:\ndisruption of the circadian rhythm is linked to depression,\nmetabolic disorders, and immune decline.\nI decided to test it on myself.\nOne month — consistent sleep times,\nmorning sunlight, evenings without screens.\nIn the third week something shifted.\nNot in my head — in my body.\nI became calmer with my daughter.\nI reacted less to small things in the cab.\nAria said: you've become softer.\nI wasn't trying to be softer.\nI just stopped being chronically exhausted.\nRhythm isn't discipline.\nIt's respect for your own biology.\nThe body knows what it needs.\nWe just forget to ask.\n· · ·\nThat night the officer let me go.\nTold me to drive home and sleep.\nI drove home. Lay down.\nAnd for the first time in that entire week —\nI slept six hours straight.\nI never did that again.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 119, "text": "Sleep isn't a break from reality.\nit will decide for itself what to do next.\nSleep isn't a pause.\nIt's another room in the same house.\n— *Stan Ari\n···\nIt's a place where reality continues without your permission.\nAnd if you don't pay attention to what you're bringing in there\n—\nRhythm is the foundation.\nBut even with perfect sleep, the noise remains.\nTo rewrite the code — you need to see the moment when the\nchange actually happens.\nNot through a miracle.\nThrough a crossing.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 120, "text": "CHAPTER 13 · THE AFTERLIFE\nNika was drawing. She was seven.\nShe'd scrawled something on a sheet of paper —\na crooked house, some kind of sun —\nand showed it to me with complete seriousness:\nlook, dad.\nI looked and said: beautiful.\nReflexively. Automatically.\nWithout even really seeing it.\nShe saw that I hadn't looked.\nI saw that she saw.\nIt lasted a second.\nBut I thought about that moment for a long time afterward.\nHow many times had I answered like that?\nHow many times had she already learned\nnormal?\nI hadn't taught her this in words.\nI transmitted it through reactions.\nThat is initiation in its everyday form.\nthat showing something — and not receiving real attention —\nis\nNot a church. Not a ceremony.\nJust the way an adult looks —\nor doesn't look — at a child.\nThe code is passed in that second.\nWithout ceremony. Without witnesses.\n···\nAt one moment — between exhaustion and silence —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 121, "text": "I thought about death for the first time\nnot as an abstraction.\nAs an option.\nAnd a strange thing happened:\nin that exact moment the fear of death disappeared.\nWhat remained was a question —\nwhat's there?\nNot with anxiety.\nWith curiosity.\nThis chapter was born from that question.\nNot as an answer.\nAs an honest look at what people have thought —\nand what that tells us about ourselves.\n· · ·\nMy grandmother wrote me a letter when I was five.\nShe lived another twenty years.\nShe would wrap her hand —\nsomething was already making it hard to write —\nand say: read this when I'm gone.\nI was small.\nI didn't understand the letter or what she was saying.\nI just remembered it.\nAnd then my mom called.\nJust her voice —\nand before any words I understood.\nShe died in her arms.\nI was in another city.\nFar away.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 122, "text": "I remember being pierced.\nNot only from grief — though from that too.\nFrom the feeling that everything connected to her —\neverything —\nhad in a single second become the past.\nLike a room where someone turned off the light.\nThe walls are the same.\nBut everything is different.\nAnd then I remembered the letter.\nIt had been lying there.\nWaiting.\nTwenty years.\nI won't say what was in it.\nThat's too personal.\nBut I'll say one thing:\nwhen I read it — she was right there.\nNot like a ghost. Not mystically.\nJust — her thoughts, her words, her care —\nall of it continued to exist.\nShe was gone.\nBut this — was not.\nAnd then I understood what the afterlife is.\nNot heaven. Not hell. Not reincarnation.\nIt's the Trace.\nWhat a person left in others while they were here.\nA letter written with a trembling hand.\nA word said at the right moment.\nCode passed not in words — but in presence.\nShe exists in me.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 123, "text": "Not as a metaphor — literally.\nHer voice in decisions I don't even notice making.\nYou live as long as someone you touched is still living.\nThat is an immortality I can accept\nwithout theology.\nWithout doctrine.\nWithout a middleman.\n···\nBut there is something else.\nThe things we don't know — but feel.\nThe space between\n\"we don't know\"\nand\n\"it can't be\" —\nthat is exactly where the question lives\nthat makes us human.\n· · ·\nI remember the day I saw a photo of my own baptism.\nI was a few weeks old.\nI understood nothing. Chose nothing.\nwas written into my file\nbefore I could say my first word.\nThis is not a verdict. Not a crime.\nIt's a mechanism.\nAnd it repeats everywhere:\nAll of this transmitted without explicit choice.\n···\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 124, "text": "And yet — a specific set of beliefs, symbols, and identities\ncitizenship by birth, a surname, a language, cultural norms.\nBut then the system adds fear — as a tool of control.\nHell. Purgatory. Eternal punishment.\nI'll be honest:\nfor many years the concept of hell\nhad extraordinary power over my decisions.\nNot because I fully believed —\nbut because I didn't fully believe the opposite either.\nDoubt is enough for fear to survive.\nThe fear of hell didn't make me better.\nIt just paralysed me.\nAnd only when I let go of that fear —\ndid I start acting from a different place.\nPsychologists have documented this:\nwhen the primary motivator of moral behaviour\nis avoidance of punishment —\nrather than an inner desire to do good —\nit damages both the quality of the behaviour\nand psychological health.\nSolomon, Greenberg and Pyszczynski showed\nReligion, nationhood, art —\nall of these are forms of symbolic immortality.\nThe concept of hell changed significantly over millennia.\nEarly Judaism had Sheol — a place of shadows,\nwith almost no punishment.\nTartarus appeared in the Greek tradition.\nIn early Christianity, hell gradually became\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 125, "text": "that fear of death is the primary engine of cultural\nconstruction.\nmore and more specific and terrifying.\nBy the Middle Ages — a detailed registry of torments.\nDante only gave artistic form\nto what theologians had already described.\nA concept that governs the fear of billions of people\nis not direct Revelation.\n···\nIt is the result of thousands of years of evolving imagination.\nI don't know what happens after death.\nThat's an honest answer.\nNobody does.\nBut I've noticed:\na system that holds people through fear of death\nraises people who are afraid to live.\nA system that speaks of dignity\nraises people who know how to live.\nI grew up believing in literal heaven and hell.\nThat belief produced fear.\nFear of dying.\nFear of making mistakes.\nFear for the fate of people I loved\nwho didn't share my beliefs.\nI no longer want to live motivated by fear of punishment.\nI want to live guided by love for life.\nThis isn't a denial of the afterlife.\nIt's an acknowledgment that my uncertainty\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 126, "text": "is a more honest position\nthan performing confidence.\nWhatever happens after death —\none thing is beyond doubt:\nlife is happening now.\nIf there is an afterlife —\nI hope what gets measured\nisn't membership in the correct religion,\nbut how much you loved, helped, and created.\nIf there is no afterlife —\nthen all the more reason\nevery moment is precious\nand worth living fully.\nThis isn't a rejection of spirituality.\nThe shift:\nFrom the spirituality of fear\nto the spirituality of conscious choice.\n— *Stan Ari\n···\nI passed through the noise.\nThrough the code.\nThrough questions about death and what lies beyond it.\nAnd at the darkest point of that path —\na person appeared.\nNot with answers.\nWith presence.\nThat is where the reboot begins.\nBLOCK IV · REBOOT how to change the code\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 127, "text": "BLOCK IV · REBOOT\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 128, "text": "CHAPTER 14 · ARIA\nThere's a question I couldn't formulate for a long time.\nexamining their own mistakes for years —\nstill not manage to break out of the same circle?\nNot because they don't want to.\nNot because they don't know how.\nBut because they're only looking at themselves\nthrough their own eyes.\nThat is the trap.\nA system cannot see its own error from the inside.\nIt only sees what it already has a category for.\nEverything else — is noise that gets filtered out.\nYou can spend years analysing yourself —\nand arrive at the same conclusions every time.\nNot because you're not smart enough.\nBecause the analysis runs along the same neural pathways\nas the problem.\nYou need an external signal.\n···\nWhy does a person who has been reading, thinking, analysing,\nSome people are alone.\nThey know they're stuck — and they're looking for a mirror.\nThat's painful but honest.\nSome have a person beside them —\nbut that person gives the wrong prompt.\n\"You always do this.\"\n\"I told you.\"\nOr the opposite — too soft:\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 129, "text": "\"Everything's fine. You're already a good person.\"\nA crooked mirror — someone is there, but the reflection is\ndistorted.\nThis is the most dangerous situation.\nWhat they actually have is a brake with a human face.\nAnd there's a third type.\nRare.\nThose who have someone beside them\nwho sees them more clearly than they see themselves.\nAria is that third type for me.\n···\nShe never told me what to do.\nHer philosophy is simple to the point of brutality:\ndon't try to change what you can't change.\nDon't spend emotional energy on it.\nJust let it go — and move toward where there's movement.\nSounds obvious.\nBut try living that way\nwhen the whole system is already on the floor\nand you don't know what's being built in its place.\nhands —\nand throwing all your energy into what can still be built.\nI couldn't.\nI didn't know how.\nI got stuck in what had already happened —\nturning it over, analysing it, justifying it, blaming.\nShe didn't argue.\nShe just lived differently — and I saw it every day.\nNot words — a pattern.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 130, "text": "Gradually that pattern started rewriting mine.\nNot because she was teaching me.\nBecause next to a person who operates differently —\nTry releasing control over what's already slipped out of your\nyour nervous system begins to copy.\nThat isn't a metaphor.\nIt's mirror neurons.\nWe literally learn through presence.\n···\nFor a long time I built relationships like a driver.\nI steer. I decide.\nMy partner — a passenger.\nComfortable and clear.\nAnd completely dead.\nBecause a car with one driver and a silent passenger\nisn't a team.\nIt's a person carrying cargo\nand calling it a relationship.\nA sailboat.\nThere is a captain — and he makes decisions.\nBut without wind he stands still.\nWithout a crew pulling the lines in sync —\nhe can't manoeuvre.\nWith Aria I understood a different model for the first time.\nhe drifts wherever the current takes him,\nnot where he needs to go.\nThe captain is me.\nBut she is the wind.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 131, "text": "And the compass.\nAnd the one who keeps the rhythm\nwhen I'm too tired to keep rowing.\nWhen something goes wrong —\nI don't hide it.\nI just say: something went wrong there.\nShe doesn't panic. Doesn't accuse.\nShe engages —\nlike a system that has received an error signal\nand runs the protocol.\nWe look at the situation together.\nNot me defending myself while she judges.\nWe are one organism diagnosing itself.\nThat is a team.\n···\nWithout someone who feels the direction and sets the rhythm\n—\nTalk — then act.\nIf you're discussing something and not acting on it —\nthat's not planning.\nThat's conflict in slow motion.\nWords without action accumulate like unprocessed stress —\nand sooner or later they explode.\nAria taught me this not through words.\nShe just always asked the same thing\nafter every conversation:\nand what are we going to do about it?\nNot tomorrow. Not someday.\nWhat are we doing — right now?\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 132, "text": "At first it irritated me.\nThen I understood:\nthis is the difference between a team and passengers.\nPassengers talk.\nA team acts.\n···\nI'm telling you about her\nnot to say: go find someone like this —\nand everything will be fine.\nI'm telling you because through her\nI understood for the first time\nwhat consciousness actually needs\nin order to shift to another level.\nNot love.\nNot support in a general sense.\nBut a specific function:\na person who sees you without your own filters —\nand gives you the right prompt at the right moment.\nThis function can be filled by a partner.\nOr a friend. Or a therapist.\nOr a book that finds its way into your hands\nat exactly the right time.\nThe question isn't whether you have an Aria or not.\nThe question is —\ndo you allow anyone or anything\nto reflect you differently\nthan you're used to seeing yourself?\nBecause as long as you're only looking at yourself\nthrough your own eyes —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 133, "text": "you only see what you already know.\nAnd a new level of awareness begins\nexactly where the familiar reflection ends.\n···\nAria.\nI know you'll read this book —\nand so these lines are for you separately.\nI love you not for the meaning you give me.\nBut because you are my light.\n— Stan\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 134, "text": "CHAPTER 15 · FOOD AND SPACE\nMost people eat when they're stressed.\nThey muffle it.\nFill the emptiness with food.\nWith me — the opposite.\nBefore all of this I was carrying some extra weight.\nNothing extreme, but it was there.\nI didn't think of food as a system.\nI just ate when I wanted, whatever was within reach.\nLike most people.\nThen the stress came.\nAnd my body started refusing on its own.\nI couldn't. Didn't want to.\nIt just wouldn't go down.\nI thought that was weakness.\nLater I understood — it was a signal.\nMy body was saying:\nnot now.\nThere are things more important than this —\nand until those are resolved, we run on minimum.\nI lost weight.\nNot because I was in control —\nbecause the system switched over on its own.\n···\nAnd then — after the worst had passed —\nsomething came that I didn't expect.\nI started noticing a connection.\nWhen I eat one thing — my head is clearer.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 135, "text": "When I eat another — heavy and empty.\nEnergy stable or not.\nSleep deep or shallow.\nNot weight. Not calories.\nExactly this.\nI ignored it for a long time.\nThought — coincidence, mood, the weather.\nBut it kept repeating.\nAnd one day I asked myself a different question:\nwhat am I giving my system —\nand what is it doing with that?\nNot a diet. Not a regimen.\nJust — I started paying attention.\nAfter sugar, thoughts slow down.\nAfter normal food at a normal time —\nthere's something like a base.\nNot a high.\nJust — solid ground under your feet.\nScience backs this up.\nExcess sugar leads to the formation of AGE products —\nmolecules that disrupt blood flow in the brain\nAfter processed food, the body is heavy and the head is hollow.\nand affect cognitive function.\nAnthony Cerami described this mechanism back in 1985.\nReal biochemistry.\nWhat I felt in myself — has an explanation.\nBut I need to be honest:\nI haven't mastered this.\nI'm still learning.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 136, "text": "There are days when everything is right.\nThere are days when I eat something I shouldn't —\nsimply because I'm tired, or in a hurry,\nor I just wanted pizza.\nAnd that's also normal.\nThat's not a system failure.\nThat's just a day.\nI'm not a teacher in this.\nI just noticed how food affects me —\nand I try to factor that in more often than not.\nSometimes it works. Sometimes it doesn't.\nIt's a process.\n···\nThe same question —\nwhat are you giving the system —\ntouched alcohol too.\nI just stopped.\nNot a decision, not a ban, not a fight with myself.\nIt just fell away on its own.\nBefore, I could drink — not much, but enough to feel it.\nNow that substitution of consciousness is unpleasant to me.\nNot for moral reasons.\nI just don't like it.\nI like having a clear mind.\nBeing fully myself.\nThe state where you start losing control —\nfor me that's no longer rest.\nIt's losing something important.\nOnce a year maybe —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 137, "text": "a glass of champagne with Aria.\nSimply because the moment calls for it\nand she's right there.\nBeyond that, there's no need anymore.\nA lot of people justify drinking as a way to unwind.\nI understand that.\nBut there's a difference between unwinding and numbing.\nUnwinding is when you're still there.\nNumbing is when you're temporarily gone.\nA lot of people call the second thing the first —\nand don't notice the difference.\nOr they notice, but it's easier not to admit it.\nNo judgment.\nI just know for myself:\na clear head matters more than any taste.\nThe body and consciousness are one system.\nWhen you remove noise from one level,\nit decreases on the other.\nFood, alcohol, sleep —\nthese aren't aesthetics and they're not self-discipline.\nThey're fuel.\nAnd it's worth asking, at least occasionally —\nwhat kind exactly.\n— *Stan Ari\n· · ·\nFood and alcohol — what goes inside.\nBut I noticed something else.\nClarity didn't only come from what I ate or didn't drink.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 138, "text": "It came from where I was.\n···\nI park the car after my shift.\nSometimes that's three in the morning.\nSometimes seven in the evening.\nDoesn't matter.\nI switch off the GPS, switch off the radio.\nAnd just sit.\nA minute. Sometimes twenty.\nThat's when the best thoughts come.\nAt first I thought it was fatigue —\nthe brain relaxing after work,\nreleasing what it had accumulated.\nBut then I started noticing:\nit doesn't depend on how long I'd worked.\nThree hours or twelve — doesn't matter.\nWhat matters is one thing:\nsilence and an enclosed space\nwhere nothing is being asked of me.\nspace literally changes how the brain works.\nHigh ceilings, natural light, absence of visual noise —\nactivate the prefrontal cortex,\nthe centre of planning and creative thought.\nA cramped, cluttered space does the opposite —\nkeeps the brain in survival mode.\nNot a metaphor. Physiology.\nWhen you're in a space where nobody expects anything —\nthe brain shifts into a different mode.\nNot problem-solving.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 139, "text": "Not reacting to what's outside.\nInternal work.\nThat's when pieces that couldn't find each other\nduring the day through all the noise\nfinally connect.\nMy car is my space of silence.\nThe neuroarchitect Fred Gage at the Salk Institute proved it:\nFor someone else it's the shower.\nFor someone else a walk without headphones.\nFor someone else five minutes in a parked car\nbefore going inside.\nThe place doesn't matter.\nWhat matters is one thing:\nyou're doing nothing there\nand nobody's touching you.\nMost people turn on music.\nScroll through their phone.\nFill the silence with something — anything.\nBecause in the silence\nwhat they don't want to hear starts talking.\nUnresolved questions. Deferred decisions.\nThe truth about themselves\nthat's more convenient not to know.\nI learned not to run from that space.\nI learned to enter it on purpose.\nAn Operator without a space of silence\nis a processor without memory.\nIt can execute commands.\nBut it can't think.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 140, "text": "Can't integrate.\nCan't step outside of reaction and see further.\nAsk yourself:\nwhen did you last sit in a space\nwhere nothing was required of you —\nand not fill that silence with your phone?\nIf it's hard to remember — that is the answer.\nAn Operator without silence is a processor without memory.\nIt works. But it doesn't think.\n— *Stan Ari\n···\nThe silence in the car gave space for my own thoughts.\nBut there's one more dimension —\nwhat happens when another person enters that same space.\nNot just anyone.\nThe same person who was there in the darkest moment.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 141, "text": "CHAPTER 16 · LIBERATION\nThere's a phrase I heard somewhere and it stayed with me.\nIf six people are sitting at a table\nand five of them are millionaires —\nsooner or later the sixth will become one too.\nThat's true.\nBut not for everyone.\nQuietly, gradually —\nthey start speaking the same words,\nthinking in the same categories,\nbeing afraid of the same things.\nNot because they're weak.\nThat's simply how most people are wired —\nA group that thinks alike survives faster.\nBut there are others.\nI took on more than I could handle —\nnot from a lack of understanding,\nbut because the pressure of the environment\noutweighed my own analysis.\nThe result — debt that dragged on for years.\nI'm not telling this to invite sympathy.\nThere are people who absorb their environment like a sponge.\nsocial synchronisation is an evolutionary survival mechanism.\nBut because at that same time my mind knew —\nand didn't listen.\nThe environment carried more weight than my own analysis.\nThat is the influence of surroundings in action.\nKnowing your own operating system\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 142, "text": "doesn't mean being insured against it.\nIt means at least not being surprised\nwhen it runs exactly as designed.\n···\nI was always this way —\nlong before I found a word for it.\nNot because I wanted to stand out.\n—\nit keeps asking \"but why exactly like this.\"\nImposing a thought from the outside\nonto a mind built that way is hard.\nIt will take apart every argument.\nVerify. Doubt.\nSeems like an advantage.\nBut\nbecause\nan\nanalytical\nmind\ndoesn't\nallow\nsimple\nacceptance\nAnd it is.\nBut it has a price.\nThe same mind that doesn't yield to crowd pressure —\ndoesn't yield to other people's experience either.\nIt can't simply trust.\nIt has to go through things itself.\nHear the warning — and do it anyway.\nBecause only then does it become Knowledge\nand not just information.\nI made mistakes despite having an analytical mind.\nThat's the most bitter part.\nNot from lack of intelligence.\nBut because I had to live through everything personally —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 143, "text": "to answer questions that other people resolve\nthrough trust in someone else's experience.\nNot business separately.\nNot relationships separately.\nEverything at once —\nbusiness, relationships, intentions,\nWatch someone else make a mistake — and repeat it firsthand.\nmy idea of who I was.\nEverything I thought I was — came apart.\nAnd only after that did the forming begin.\nSolomon Asch proved back in the 1950s:\n—\nif the group around them answers differently.\nFor most people.\nFor those resistant to influence — a different challenge.\nThey can avoid groupthink.\nBut they'll pay for it with a longer road.\nA more painful one.\nWithout the shortcuts that trust provides.\nI don't know which is better.\nA person who absorbs the environment —\ncan quickly fit into any context.\nBut risks losing themselves without noticing.\nA person who's resistant to influence —\nkeeps themselves intact.\nmost people change their answer from the obviously correct\none The pressure of the environment is stronger than your own\neyes.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 144, "text": "But only learns through their own skin.\nWhite crows don't change under the pressure of the table.\nThey only change through their own fall.\nAnd that's not a verdict.\nWhite crows don't learn from other people's words.\nOnly through their own experience.\n— *Stan Ari\n···\nThat's just an operating system with a different architecture.\nThere's a program installed in childhood.\nNot through words — through comparison.\n\"Look, he can do it — why can't you?\"\nThe boy next door gets better grades.\nA cousin is already earning.\nSome guy you know bought an apartment at twenty-five.\nAnd you stop living —\nand start responding.\nTo other people's standards.\nOther people's pace.\nOther people's idea of what success looks like.\nI kept doing more than I needed.\nNot because I wanted to —\nbut because the comparison mechanism\nwas already running inside me.\nAutomatically. Without my permission.\nYou can make a million.\nYou can become for a year\nthe person you used to be compared to.\nBut after a year — you'll return to who you were.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 145, "text": "Not because you didn't try hard enough.\nBut because it's not yours.\nSomeone else's pattern doesn't take root.\nIt holds while there's external pressure —\nand falls away as soon as the pressure disappears.\nBecause underneath it there's no ground of your own.\nMoney for me — is not a value.\nIt's material for needs.\nI didn't understand this right away —\nnot through wisdom.\nThrough trying to make it a goal —\nand seeing that it was empty.\nLiving by someone else's logic\nis like wearing shoes that don't fit.\nYou can walk.\nBut not far.\n···\nThe greatest cost of those mistakes — wasn't the money.\nWhen everything collapsed, I understood:\nthe money wasn't the goal.\nIt was a way of proving something.\nTo someone. To myself. To everyone at once.\nI wasn't building a life — I was building an image.\nAnd when everything came down,\nthe image fell first.\nWhat remained was a question:\nwhat's underneath?\nTurned out — almost nothing of what I thought.\nDaniel Kahneman arrived, after decades of research,\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 146, "text": "at a simple conclusion:\nbeyond a certain level of income,\nmore money doesn't add more happiness.\nIt only adds more complexity.\nMore to protect.\nMore to fear losing.\nI didn't arrive at this through a book.\nThrough my own rock bottom.\n···\nI drive a cab consciously —\nnot because there's no way out,\nbut because it gives me\nwhat you can't buy with status:\nreal people.\nDifferent ones every day.\nA businessman at seven in the morning.\nAn elderly woman with bags from the market.\nA drunk guy who's crying and doesn't know why.\nA mother with a child quietly explaining something\nto her in the back seat.\nEach one — a separate operating system.\nEach carrying their own code,\ntheir own fears,\ntheir own logic of survival.\nI listen. I observe.\nThis isn't a job —\nit's field research into human nature\nthat I get paid for.\nFood. Sleep. Warmth.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 147, "text": "Aria beside me.\nA laptop to write down a thought before it disappears.\nShe's sixteen now. She has her own road.\nThis isn't asceticism.\nThis is clarity.\nThe difference between poverty and simplicity\nis where it comes from.\nPoverty is when something is taken from you.\nSimplicity is when you yourself chose what's enough.\nThe first constricts.\nThe second sets you free.\nPsychologists call this a Sense of Sufficiency.\nThe opposite not of poverty —\nbut of the permanent \"just a little more and then.\"\nThen I'll buy. Then I'll rest. Then I'll start living.\nPeople in \"just a little more\" mode\nnever actually live —\nthey're always preparing.\nI lived that way for years.\nMoney as a goal creates one trap:\nyou never know how much is enough.\nThe target moves with you.\nYou reach it — the bar rises.\nThat's not motivation.\nThat's a cage with moving walls.\nMoney as a means — different logic.\nThere are specific needs.\nThere's an amount that covers them.\nEverything above that — is freedom, not status.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 148, "text": "Now I wake up and don't think about what others will say.\nI think about whether there's food,\nwhether it's warm,\nwhether there's time to write a page.\nIf yes — the day was a good one.\nThis isn't regression.\nThis is liberation from a pattern that was never mine.\nThat fall took the money.\nBut along with it, it took the need to prove.\nMoney can buy everything\nexcept the feeling that you already have enough.\n— *Stan Ari\n···\nAnd in the space that opened up — Aria arrived.\nBut that's already a different conversation.\nAbout the body. About shame.\nAbout things I was never taught to say out loud.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 149, "text": "CHAPTER 17 · THE BODY\nThere are things people don't talk about.\nNot because there are no words.\nBut because silence is transmitted the same way words are —\nthrough a look,\nthrough a pause,\nthrough the way an adult suddenly changes the subject.\nI grew up in a culture where this wasn't discussed.\nNot just left in silence — actively not discussed.\nWhen the topic got close —\nadults changed the subject or looked away.\nA child reads this perfectly:\nsomething is forbidden here.\nSomething to be ashamed of here.\nThis is not yours.\nThe first code I received about my own body:\nit is a problem.\nNot a resource, not a source of joy —\na problem to be controlled.\nA teenager who is beginning to feel himself\nand at the same time receives the signal that this is bad —\nnot through words, through silence and glances —\ngrows up with a fracture inside.\nBetween who he is and who he's supposed to be.\nI carried that fracture for years.\nWithout even knowing what to call it.\n···\nWith Aria everything was different from the start.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 150, "text": "Not because she's special in some abstract way.\nBut because she spoke about things directly.\nWithout shame and without unnecessary weight.\nSimply as a part of life that exists —\nand deserves an honest conversation.\nThe first time we talked openly about intimacy —\nit was uncomfortable.\nI caught myself avoiding words.\nReaching for euphemisms.\nLooking away.\nShe noticed.\nShe said: you can speak directly.\nI won't be scared.\n···\nDuring intimacy, oxytocin levels rise sharply —\nand stay elevated afterward.\nNeurobiologists documented this as far back as the 1980s:\noxytocin builds attachment and trust at a molecular level.\nThat's exactly why after real closeness —\nnot only physical but emotional —\na connection forms between two people\nthat can't be explained rationally.\nIt is literally chemical.\nBut there's another side.\nIf intimacy happens inside anxiety,\ninside shame, inside a performance —\nthe chemistry is the same\nbut the quality of the connection is different.\nThe body remembers context.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 151, "text": "If for years intimacy has been associated with tension —\nthe system begins responding to it with tension.\nA closed loop.\nI noticed this in myself.\nIn the first years after my divorce —\nNot conscious.\nAria didn't try to \"fix\" this.\nShe simply stayed — patiently and without pressure.\nany closeness automatically switched on something like\nanxiety. Just something in the body that tightened and\nwouldn't let go.\nAnd gradually —\nthe body started to understand that it was Safe here.\nThat took time.\nMore than I expected.\n···\nAria and I learned to talk about it —\nwhat's good, what isn't,\nwhat's needed, what's frightening.\nNot like a medical procedure.\nNot like a romantic ritual.\nSimply as a part of a shared life\nthat deserves attention and honesty.\nIt's uncomfortable at first.\nEspecially if you grew up somewhere this wasn't discussed.\nBut what comes after that openness —\nis much deeper than the silent closeness I knew before.\nSexuality is not the lesser part of human experience.\nIt is an important dimension\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 152, "text": "of physical and psychological health.\nBeing ashamed of it\nis like being ashamed of your own heart.\nwasn't looking out for you.\nIt was looking out for its own comfort.\nYour body deserves better.\nAnd so do you.\n— *Stan Ari\n···\nThe culture that taught you to stay silent about your body —\nThe body isn't the enemy.\nIt was simply waiting —\nfor me to finally learn how to listen to it.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 153, "text": "CHAPTER 18 · THE CROSSING\nAria gave back the connection to my body.\nA riverbank gave back the connection to myself.\n···\nI was standing on the bank.\nThe river below — calm, indifferent.\nI was forty-one.\nEverything I had built was on the floor.\nAnd I was doing the math:\nThe answer was years.\nMany years.\nAnd then a thought came —\nnot panicked, but quiet and very precise:\nI am spending myself.\nNot money — myself.\nWhile I untangle this knot —\ntime is going by that no payment will ever give back.\nForty-one. Not twenty-five. Not thirty.\nAria was standing beside me.\nShe wasn't saying anything.\nShe looked into my eyes — and believed in me.\nNot that everything would be fine.\nNot in a plan.\nJust — in me.\nIn the person standing next to her on the bank\nwho didn't yet know what to do next.\nI don't know if she understood what was happening inside.\nBut that look did one thing:\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 154, "text": "how much time it would take to untangle what had\naccumulated.\nI stopped feeling like a knot.\nFor a moment — just a person.\nThen an image of Aria came to me.\nNot words — just an image.\nShe wakes up in the morning and reaches out her hand.\nAnd there's someone beside her.\nBut it's no longer me.\nIt's a person being eaten alive by fear,\nwho lives at work,\nwho spends their whole life servicing debt.\nTechnically — there.\nIn reality — gone.\nThat's what stopped me.\nNot death.\nYou can be together and separate at the same time —\nnot seeing yourself or the person you love\nnot because you don't love them,\nbut because behind the exhaustion everything collapses:\nthe relationship, the life, you yourself.\nYou stop being a person — you become a machine.\nAnd the person who chose you —\nsooner or later ends up alone.\nNot because they left.\nBut because you left first —\njust not yet physically.\nThat was enough.\nI didn't make any big decision on that bank.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 155, "text": "I just turned around and walked to the car.\nBut something in my head shifted —\nquietly, without a click.\nNot a decision.\nA change of direction.\nFrom the question \"is life worth living\"\n···\nto the question \"how do I live so that this is actually mine.\"\nOn that bank I stopped feeling like a knot.\nBut to keep from going back to it —\nsomething deeper needed to change.\nThe language I used to speak to myself.\n···\nThe family line doesn't arrive like a vision.\nNot like a voice from outside.\nIt comes like a warm blanket —\nsuddenly and without warning.\nThe first thought in the morning.\nBefore the mind switches on,\nbefore logic arrives,\nbefore I remember how much needs to get done today.\nA bare thought. Original.\nI noticed it in the hardest time.\nNot an argument, not a plan —\njust: I exist. I'm here. Someone needs this.\nNot the state. Not the church.\nNot a system that wants you to pay taxes\nand not ask too many questions.\nThe family line.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 156, "text": "Those who came before me\nTo be born — means this was supposed to happen.\nNot in the sense of fate from above.\nand put something into this initialisation — not by accident.\nBut in the sense of the chain:\nsomeone survived, someone chose, someone passed it on —\nand here I am.\nThis thought needs no proof.\nIt simply is — warm, quiet, before any logic.\nWe've muffled everything with words.\nExternal voices telling us who we are,\nwhat we're worth, what our existence means.\nReligion provided one version.\nThe state — another.\nSocial media — a third.\nAnd somewhere underneath all those layers —\nthat first voice.\nInternal.\nWithout grammar and without arguments.\n···\nI changed my internal language —\nnot through affirmations, but through awareness.\nInstead of \"I'm bankrupt\" —\n\"I'm in the process of rebuilding.\"\nInstead of \"this is impossible\" —\n\"I haven't found the solution yet.\"\nThis isn't denial of reality.\nIt's a change of frame\nthat allows the brain to look for a way out\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 157, "text": "instead of confirming there is none.\nNeuroscience confirms it:\nwhat we repeat to ourselves forms neural connections.\nWords are not just air.\nThey are building material for neural patterns.\nAfter I understood the power of a word —\nI started listening differently.\nAnd the loudest thing I heard —\nwere the voices of those who are no longer here.\nThe family line.\n···\nA word changes a neural pattern.\nBut there is something deeper than a word —\nwhat arrives before words.\nThat first thought after silence.\nI was lying there after everything had collapsed —\nempty like a dead phone.\nAnd then a thought came.\nOne. Clear. Like lightning.\nI assumed I had thought it up.\nThat's how it always goes.\nA person claims ownership of a thought\nthe same second it appears.\nBut what if that's not what happened?\nWhen you're doing nothing —\nwhat switches on is the default mode network.\nThe resting state.\nThis isn't rest.\nIt's the brain's deepest work:\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 158, "text": "it integrates, connects fragments of experience,\npulls up from the depths\nwhat couldn't break through the noise of an active day.\nThis is exactly the mode\nwhere solutions arrive that you weren't searching for.\nInsight.\nThe first thought after silence.\nThe ancestors speak precisely here.\nNot as images. Not as voices.\nAs an impulse —\nYou did something a certain way — and you didn't know why.\nYou just knew.\nThis isn't mysticism.\nIt's what the mind has been accumulating for years —\nthe stories, reactions, and patterns of the people who came\nbefore you.\nAll of it lives inside you as architecture.\nAnd in the silence, it speaks.\nThe cleaner you are as a mind —\nthe cleaner the signal.\nIf you're packed with anxiety, shame,\nand other people's expectations —\nthe default mode network runs on noise.\nThoughts arrive twisted, without force.\nBut when the intention is simple and direct —\na fraction of a second before the brain has shaped it into\nwords.\nthe first thought is almost always right.\nThat lightning bolt in the night —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 159, "text": "I know now where it came from.\nI didn't think it up.\nIt passed through me.\nThe Operator's job isn't to wait for a signal.\nThe job is to become clear enough\nnot to drown out what's already coming.\nMy antenna is me.\nYour antenna is you.\nBut an antenna without an Operator is just noise.\nYou receive the signal — and you decide what to do with it.\nThat's the difference\nbetween a person living on autopilot\nand a person living consciously.\nThe family line is already speaking.\nThe only question is how much noise is between you.\nThe family line is already speaking.\nYour job is to clear the noise between you.\n— *Stan Ari\n· · ·\nThe crossing had begun.\nThe noise was fading.\nAnd there, in the silence —\nI found the last thing I needed to understand.\nThe thing that makes the code alive.\nAction.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 160, "text": "CHAPTER 19 · TRANSFORMATION\nThere are people in life who cause pain.\nNot once — systematically. For years.\nAnd you carry it inside —\nthe anger, the resentment,\nsometimes the wish that things go badly for them.\nThat's normal.\nThat's human.\nBut there comes a moment —\nit doesn't arrive right away —\nwhen the resentment becomes heavier than what caused it.\nWhen you're suffering more from the hatred itself\nthan from what that person actually did.\nThat's when the question changes.\nNot \"how could they\" —\nbut \"why did this happen to me at all.\"\nNot to justify. To understand.\nIf my life had gone smoothly —\nwould I have been looking for answers?\nWould I have written this book?\nThe very people who caused the most pain —\npushed me out of the comfort zone\nand into the zone of searching.\nWithout them I would have stayed where I was.\nComfortable. Empty. A stranger to myself.\nRichard Tedeschi and Lawrence Calhoun described\npost-traumatic growth —\nthe phenomenon where people, after serious trials,\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 161, "text": "report personal growth\nthat would not have existed without that event.\nAfter a real blow, the brain doesn't simply recover.\nIt reorganises.\nForms new connections.\nFinds paths that didn't exist before.\nMy scars are not my shame. They are my map. ···\nTransformation is a word everyone has heard\nand almost nobody has described honestly.\nNot the way it looks in books.\nA decision. An epiphany. A new path. Clean and clear.\nIn reality it looks different.\nLike an ordinary morning —\nyesterday.\nNot better. Not worse.\nJust — different.\nI remember that morning. Not the date — the feeling.\nI woke up. Lay back down. Got up again. Made coffee.\n—\nI understood:\nI'm not thinking about the debts.\nbut with the feeling that something is not quite the same as As\nif something inside quietly shifted while you were sleeping.\nAnd only when I was sitting with the mug looking out the\nwindow\nNot because they'd disappeared.\nBut because they had stopped being the centre.\nFor the first time in two years — not the centre.\nThat is the moment of transformation.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 162, "text": "Not when you decide to change.\nBut when you notice you already have.\nThe decision comes after —\nas a confirmation of what has already happened inside.\n···\nThere's a story about an eagle.\nAs an eagle ages — its beak becomes too large.\nToo curved.\nIt can no longer hunt the way it used to.\nThe old beak gets in the way.\nThe talons have dulled.\nThe feathers are heavy and drag it down.\nAnd so the eagle does what seems impossible.\nIt flies to a cliff — alone, apart from the flock —\nand grinds its beak against the rock.\nPainful. Long.\nUntil a new one grows.\nThen it pulls out the old talons —\nand waits for new ones to grow.\nThen it pulls out the feathers —\nthe old heavy feathers that dragged it down —\nand waits for new ones to grow.\nThis takes months.\nAll that time it sits on the cliff.\nAlone. Without the flock.\nHungry — because without a beak it cannot hunt.\nWithout strength — because without feathers it cannot fly.\nIt does nothing.\nJust waits.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 163, "text": "Picture this.\nAn eagle — a royal bird, the peak of the sky —\nsits motionless and waits\nfor what isn't there yet to grow.\nIt doesn't know exactly when.\nIt just knows — it has to wait.\nVulnerable — because without talons it cannot defend itself.\nAnd it waits.\nDay after day.\nHungry. Weak. Bare.\nThis doesn't look like strength.\nIt looks like the end.\nBut it's precisely in that waiting —\nthat the transformation happens.\nNot in the moment when the beak has grown.\nBut in those months when it isn't there yet —\nand the eagle stays on the cliff anyway.\nDoesn't flee.\nDoesn't return to the flock with the old broken beak.\nJust — waits for the new one.\nThose who can't hold out — fly too soon.\nWith feathers not yet grown.\nAnd fall.\nThose who hold out —\ntake flight as a bird that has never existed before.\nThose who don't do it at all — die.\nSlowly.\nWith the same old beak that can no longer catch anything.\nI recognised myself in that eagle.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 164, "text": "And I recognised the moment I finally flew to my cliff.\n···\nI didn't grind away everything at once.\nOne thing at a time.\nFirst — the role.\nFor years I'd been playing the role of a person who handles\nthings.\nA man holds himself together.\nA man doesn't complain.\nA man finds a solution — or stays quiet.\nThat role cost me more than any debt.\nIt cost me myself.\nLetting it go was painful —\nbecause underneath it turned out to be empty.\nAt first.\nThen the emptiness began to fill with something else.\nNot a role — presence.\nSimply — I exist.\nWithout a function. Without a mask.\nJust a person sitting in the morning with coffee\nlooking out the window.\nThen — the waiting.\nWaiting for someone to come and say:\nyou did everything right.\nOr: everything will be fine.\nOr just to see — without words — that it's hard.\nI'd been carrying that waiting for years.\nNobody ever came.\nI ground that down too.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 165, "text": "Then — the resentments.\nNot all at once. One by one.\nSome easily.\nSome — years after I thought I'd already let go.\nTransformation isn't a one-time action.\nIt's a process without a finish date.\nYou don't wake up transformed.\nYou simply choose — again and again —\nto grind away one more layer of the old.\nAnd with each layer you become lighter. ···\nWhen you let go of enough —\nwhat remains is something you couldn't see\nthrough all the layers.\nWhat remains is who you actually are.\nNot the role. Not the mask.\nNot the version of yourself that others approve of.\nJust — you.\nWith all your contradictions.\nWith all your unresolved questions.\nWith everything that isn't settled yet and may never be.\nAnd it turns out — that's enough.\nA person without a role and without a mask\nalready is something.\nAlready deserves attention.\nAlready interesting — to themselves and to others.\nNot because of what they've achieved.\nBut because they exist.\nWhen the noise switches off —\nsomething simple remains.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 166, "text": "I love Aria not for what she's done.\nI love her because she exists.\nThat state — seeing a person without conditions,\nand being seen the same way —\nthat is the clean signal I return to\nwhen the noise gets too loud.\n···\nthe external expectations, the social roles, the old resentments\n—\nTransformation doesn't come when everything is good.\nIt comes when the old can no longer hold.\nWhen there is no choice —\neither grind it away or sink.\nThe eagle knows this instinctively.\nA person has to arrive at it through understanding.\nThis book is my cliff.\nThe place I flew to in order to grind.\nI don't know how many layers remain.\nI know one thing —\neach one let go makes me lighter.\nAnd every morning when I wake up\nand don't feel that old weight —\nthat is transformation.\nNot an event.\nA morning.\nRenewal isn't a beginning.\nIt's the choice to release what's in the way.\nEvery day. One layer at a time.\nAnd that choice — is yours alone.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 167, "text": "— *Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 168, "text": "EPILOGUE\nI'm still driving.\nEvery day — the city, the streets,\nnew faces in the rearview mirror.\nA cab driver who is searching.\nThat hasn't changed.\nWhat has changed is something else.\nAria is there.\nIn the evening I come home — and she's there.\nSometimes I write at night when she's asleep.\nSometimes between rides —\nI jot down a thought before it disappears.\nSometimes we just sit together in silence —\nand that's enough too.\nMy daughter is in high school now.\nBuilding her own life.\nAnd this book —\nwhich I wrote between rides,\nbetween passengers,\nbetween mornings and nights —\nexists.\nIt's in front of you.\nEverything written here —\nAria and I wrote for those who will come after us.\nSo that something passes forward.\nNot property. Not titles.\nThoughts that helped us —\nmaybe they'll help you too.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 169, "text": "···\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 170, "text": "THE OPERATOR IN ACTION\nThis book is about understanding.\nBut understanding without action stays information.\nHere is the minimum you can start with.\nThe morning signal.\nFive minutes before the phone.\nThree questions:\nWhat do I have right now?\nWhat am I grateful for?\nWhat am I doing today?\nNot a to-do list. An intention.\nThe startup ritual.\nFind your thirty seconds.\nIn the car. In the bathroom.\nAnywhere you're alone and nothing is required of you.\nPlace your hands. Wait.\nStart the day from there.\nThe ancestral altar.\nOne photo. One object. One minute a day.\nNot mysticism — memory that gives you roots.\nInternal language.\nreact.\"\nNotice \"I can't\" — replace it with \"I haven't found how yet.\"\nNotice \"I'm just like this\" — replace it with \"this is how I used\nto\nThe brain listens to every word.\n66 days.\nChoose one new behaviour. Any one.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 171, "text": "Write for ten minutes after waking.\nOr read. Or sit in silence.\nThe main thing — every day.\nBy day sixty-six it will be yours.\nThis isn't a manual.\nThis is the minimum.\nYour code is yours.\nYou know where to begin.\n···\nThis book is not about me.\nIt's about what is already in you.\nand about the choice you can make right now.\nNot someday.\nNow.\nAt the beginning I wrote:\nthere are two kinds of leaving.\nAbout the code that was written into you before you arrived —\nThe first — when something drives you out.\nThe second — when something inside says: now.\nThe same is true of transformation.\nThere are two kinds.\nThe first — when circumstances break you\nand you change because there's no other way out.\nThe second — when you hear that internal voice yourself\nand move toward it.\nWithout guarantees. Without a plan.\nJust — you know.\nYou are not starting from zero.\nEverything you already know.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 172, "text": "Everything that has already been passed to you —\nconsciously and unconsciously.\nThe Operator is not the one who never falls.\nThe one who each time decides — to get up.\nFear comes after.\nClarity — before.\nIf you have clarity — go.\nYou are starting from everything you've already lived through.\n— *Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}], "pl": [{"n": 1, "text": "t\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 2, "text": "THE LIFE OPERATOR\nPrzebudzenie · Tom 1\n33% z każdego sprzedanego egzemplarza — na schronisko dla\nzwierząt\nFundacja „Aria\"\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 3, "text": "SPIS TREŚCI\nBLOK I · PUNKT WEJŚCIA\nPROLOG · EMIGRACJA JAKO RESTART\nBLOK II · SZUM\nROZDZIAŁ 1 · RELIGIA\nROZDZIAŁ 2 · GRZECH PIERWORODNY\nROZDZIAŁ 3 · DYSONANS\nROZDZIAŁ 4 · MODLITWA\nROZDZIAŁ 5 · SYSTEM\nBLOK III · KOD\nROZDZIAŁ 6 · CYNKOWA ISKRA\nROZDZIAŁ 7 · KOD RODU\nROZDZIAŁ 8 · INTUICJA\nROZDZIAŁ 9 · STAROŻYTNE TECHNOLOGIE\nROZDZIAŁ 10 · DZIECI\nROZDZIAŁ 11 · REINKARNACJA\nROZDZIAŁ 12 · SEN\nROZDZIAŁ 13 · ZAŚWIATY\nBLOK IV · RESTART\nROZDZIAŁ 14 · ARIA\nROZDZIAŁ 15 · JEDZENIE I PRZESTRZEŃ\nROZDZIAŁ 16 · WYZWOLENIE\nROZDZIAŁ 17 · CIAŁO\nROZDZIAŁ 18 · PRZEJŚCIE\nROZDZIAŁ 19 · TRANSFORMACJA\nEPILOG\nOPERATOR W DZIAŁANIU\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 4, "text": "BLOK I · PUNKT WEJŚCIA\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 5, "text": "PROLOG · EMIGRACJA JAKO RESTART\nKiedy jedziesz nie od czegoś — ale do siebie\nSą dwa rodzaje emigracji.\nPierwszy — kiedy wypędza.\nWojna. Bieda. Niebezpieczeństwo.\nJedziesz, bo nie masz wyboru.\nTo rozumie każdy i nie wymaga wyjaśnień.\nDrugi — kiedy coś w środku mówi: czas.\nNie okoliczności. Nie kryzys. Nie katastrofa.\nPo prostu — wiesz.\nI nie możesz powiedzieć, dlaczego.\nMój był drugi.\n· · ·\nMiałem wszystko, co uchodzi za sukces.\nDom. Samochód. Motocykl. Pracę. Córkę obok.\nStabilizację — tę samą, którą wszyscy wokół budowali latami i\nuważali za cel.\nI każdego ranka budziłem się z poczuciem, że żyję nie swoje\nżycie.\nNie cudze. Nie złe.\nPo prostu — nie swoje.\nJak ubranie, które leży dobrze, ale nie jest szyte na ciebie.\nChodzisz w nim. Wyglądasz normalnie.\nAle czujesz — nie to.\nDługo nie mogłem tego nazwać.\nPo prostu coś w środku wiedziało.\nCicho. Bez argumentów. Bez planu.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 6, "text": "I pewnego ranka obudziłem się i zrozumiałem: czas.\n· · ·\nSprzedałem wszystko. Nie część. Wszystko.\nDom. Samochód. Motocykl. Rzeczy, które nie zmieściły się do\nwalizek.\nNie zostawiłem sobie wyjścia awaryjnego —\nbo gdybym zostawił, wróciłbym.\nA wracać nie było dokąd.\nTylko do przodu.\nWziąłem córkę. Kupiłem bilety.\nPojechałem do kraju, którego języka nie znałem.\nBez pracy. Bez znajomych. Bez gwarancji.\nTo było jeszcze przed wojną — nie z przymusu.\nPo prostu — tak trzeba było.\nI w tamtej chwili — żadnego strachu.\nTylko poczucie, że w końcu robię coś właściwie.\n· · ·\nJechała ze mną. Mała.\nW nieznane, które sam nie potrafiłem opisać słowami.\nNie wybierała — ufała.\nTo najtrudniejsza część tamtego kroku.\nNie sprzedaż domu. Nie zostawienie tego, co znane.\nTylko — wziąć dziecko i powiedzieć sobie:\nodpowiadam nie tylko za swój wybór.\nAle za to, jaki Kod ona wyniesie z tego przejścia.\nNie wiedziałem wtedy, czy robię dla niej dobrze.\nWiedziałem jedno —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 7, "text": "zły ojciec nie da dziecku dobrego startu.\n· · ·\nPierwszy rok — naprawdę wszystko nowe.\nCiężko, ale żywe.\nA potem — bez ostrzeżenia — włączył się stary program.\nWczesne wstawanie. Praca. Jedzenie. Sen.\nNie zauważyłem, kiedy to się stało.\nPewnego ranka obejrzałem się —\ni zobaczyłem to samo kółko.\nTylko w innym mieście. Z innym językiem dookoła.\nAle w środku — ta sama wiewiórka. Te same kręgi.\nJechałem, żeby zmienić życie.\nA zobaczyłem siebie —\ni zrozumiałem, że wiozłem ze sobą cały stary Kod.\nW walizkach.\nTaksówkarz. Nowy kraj. Nowy język.\nAle ten sam ja.\nWtedy jeszcze nie rozumiałem najważniejszego:\nwiedzieć, jak trzeba żyć i żyć inaczej —\nto dwie zupełnie różne rzeczy.\nMiędzy nimi — przepaść.\nI ta przepaść ma nazwę.\n· · ·\nTamten rok — nie żyłem. Funkcjonowałem.\nW dzień — kursy, klienci, uśmiech.\nW nocy — sufit i myśli, które nie odpuszczały.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 8, "text": "Ciało bolało w tle — jak Szum, którego już nie słyszysz, ale\nktóry nigdzie nie znika.\nUcisk w klatce, który nie przechodził tygodniami.\nWłosy, które zaczęły wypadać.\nZęby, od których odłamywały się kawałki —\nlekarz powiedział, że to przez zgrzytanie w nocy, którego nie\npamiętałem.\nCiało prowadziło dziennik tego, czego nie chciałem przyznać.\n· · ·\nSą myśli, o których się nie mówi.\nKtórych się wstydzimy.\nChowamy tak głęboko, że sami zaczynamy wierzyć — ich nie\nbyło.\nU mnie były.\nNie chciałem żyć.\nNie jako piękna fraza.\nJako fizyczne poczucie zmęczenia samym istnieniem.\nŚciany wszędzie.\nNie dlatego, że nie szukałem.\nPo prostu — wszędzie.\nNikomu o tym nie mówiłem.\nNie mogłem prosić o pomoc — to też był Kod.\nMężczyzna wytrzymuje.\nMężczyzna radzi sobie sam.\nMężczyzna nie narzeka.\nKrzyczałem — ale w środku.\nCicho. Żeby nikt nie usłyszał.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 9, "text": "· · ·\nI wtedy patrzyłem na córkę.\nJej oczy.\nPo prostu jej oczy — i tyle.\nNie słowa. Nie logika. Nie plan.\nPo prostu spojrzenie człowieka, dla którego jeszcze istnieję.\nKtóry budzi się i wie, że tato jest.\nTo trzymało.\nDzień za dniem.\n· · ·\nO dziewiątej wieczór wyłączałem dźwięk.\nNie dlatego, że chciałem odpocząć.\nBo wiedziałem — po dziewiątej windykatorzy już nie dzwonią.\nI czekałem na tę ciszę\njak na jedyną rzecz, która tego dnia należała do mnie.\nW ciągu dnia telefon był wrogiem.\nKażde połączenie — nowa kwota.\nNowe ostatnie ostrzeżenie.\nNauczyłem się czytać pierwsze cyfry i wiedzieć jeszcze przed\nodebraniem —\nto bank, to znowu oni.\nO dziewiątej — cisza.\nI siedziałem w niej.\nPo prostu istniałem.\n· · ·\nW tamtym czasie prowadziłem profil na TikToku.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 10, "text": "Nie dla sławy.\nPo prostu — musiałem gdzieś wylewać to, co zbierało się w\nśrodku.\nMyśli, które nie miały dokąd iść.\nPytania, na które nie miałem odpowiedzi.\nLive'y, gdzie mówiłem prosto w kamerę i czułem, że gdzieś są\nludzie, którzy słyszą.\nNa jeden z takich live'ów weszła Aria.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 11, "text": "t\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 12, "text": "Nie widziałem jej.\nZwykły nick wśród innych.\nAle coś — nie mogę tego wytłumaczyć logicznie i nie będę\npróbował — coś w środku szarpnęło.\nZrobiłem ją moderatorem. Nieznajomą. Bez powodu.\nPo prostu — tak.\nTak zaczynają się rzeczy, które zmieniają wszystko.\n· · ·\nO drugiej czterdzieści siedem wziąłem telefon.\nJest taki moment, kiedy boisz się nie tego, co zobaczysz —\nale tego, że nic się nie zmieni.\nOtworzyłem.\nByła wiadomość od Arii.\nByła półtora tysiąca kilometrów dalej.\nNigdy nie spotkaliśmy się fizycznie.\nAle była tam — za każdym razem, kiedy otwierałem telefon w\nśrodku nocy.\nNie rozwiązywała moich długów.\nRobiła coś innego —\npisała jak człowiek, który mnie widzi.\nNie długi. Nie porażkę.\nMnie.\nNie uratowała.\nNie pozwoliła upaść.\nI to wystarczyło.\n· · ·\nPół roku później przyjechała.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 13, "text": "Nie na tydzień.\nNa zawsze.\n· · ·\nWtedy jeszcze nie znałem jej historii w całości.\nDowiadywałem się stopniowo — nie z jednej rozmowy, z wielu.\nZ tego, jak milczała o niektórych rzeczach.\nZ tego, jak reagowała, gdy ktoś wspominał o stracie.\nAria straciła mamę. Potem ojca. Potem męża.\nA rok później — brata.\nZginął na wojnie.\nNie wiem, jak człowiek to znosi.\nNie abstrakcyjnie — fizycznie.\nJak wstajesz rano, kiedy każdy rok zabiera kogoś kolejnego.\nKiedy przestajesz bać się następnego ciosu —\nbo nauczyłeś się, że przyjdzie.\nCzekasz i starasz się żyć między ciosami.\nZostał jej jeden brat. I ja.\nNie opowiadała tego jak tragedii.\nNie szukała litości.\nPo prostu — żyła z tym. Niosła.\nI przy tym pozostawała człowiekiem, który patrzy na świat z\nciekawością, a nie z pretensjami.\nKtóry zadaje pytania zamiast przeklinać odpowiedzi.\nTo właśnie uderzyło mnie najbardziej.\nNie to, przez co przeszła.\nAle jaka pozostała po tym.\n· · ·\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 14, "text": "Okazało się, że jesteśmy podobni w tym, co najważniejsze.\nOboje straciliśmy to, co uważaliśmy za siebie.\nOboje przeszliśmy przez punkt, gdzie wydaje się, że dalej już\nnic nie ma.\nI oboje — zamiast się zatrzymać — zaczęliśmy pytać.\nDlaczego tak jest urządzone.\nSkąd bierze się ból, który przechodzi przez pokolenia.\nCzy można coś zmienić — nie w okolicznościach, ale w sobie.\nCzy jest sposób żyć inaczej, kiedy wiesz już, że zewnętrzne nie\nratuje.\nPatrzyliśmy na wszechświat tak samo.\nNie przez religię i nie przez naukę osobno —\nprzez coś pomiędzy.\nPrzez\nwłasne\ndoświadczenie,\ndla\nktórego\nszukaliśmy\nwyjaśnienia.\nI zaczęliśmy szukać razem.\nTe rozmowy — w nocy, między kursami, w ciszy po dziewiątej\n—\nstały się fundamentem tej książki.\nNie myślałem i nie pisałem sam.\nRazem zadawaliśmy pytania.\nJa zapisywałem.\nTa noc o drugiej czterdzieści siedem nie była końcem.\nByła pierwszą linią nowego Kodu — wspólnego.\n· · ·\nTa książka nie urodziła się w taksówce.\nUrodziła się później.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 15, "text": "Kiedy Aria już przyjechała i już mieszkaliśmy razem.\nWieczorami — po moich zmianach — po prostu siadaliśmy i\nrozmawialiśmy.\nPotrafiliśmy siedzieć godzinami.\nOna coś opowiadała. Ja coś opowiadałem.\nSzukaliśmy. Czytaliśmy. Odkrywaliśmy razem.\nWracaliśmy do tego samego tematu z innej strony.\nTo nie były rozmowy „o problemach\".\nTo były rozmowy o tym, jak jest urządzony świat.\nDlaczego ludzie żyją tak, a nie inaczej.\nSkąd bierze się strach.\nDlaczego wiedza nie zmienia zachowania.\nDlaczego jedni po upadku wstają, a drudzy nie.\nPewnego wieczoru — nie pamiętam po którym pytaniu —\nAria powiedziała: powinieneś to zapisać.\nNie notatki. Książkę.\nNajpierw machnąłem ręką.\nPotem pomyślałem.\nPotem zacząłem.\nTo, co trzymasz w rękach — to wynik tamtych wieczorów.\nJej pytań. Moich prób odpowiedzi. Naszych wspólnych\nposzukiwań.\nPisałem ja.\nAle ta książka — nasza.\n· · ·\nZmieniłem kraj — ale nie siebie.\nStary Kod przyjechał ze mną w walizkach.\nI dopiero, kiedy system całkowicie stanął —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 16, "text": "dopiero wtedy zaczęło się prawdziwe przepisywanie.\nTa książka — o tym Kodzie.\nSkąd pochodzi.\nCo w nim cudze — a co naprawdę twoje.\nI dlaczego samo zrozumienie nie wystarczy.\nNie instrukcja.\nSpowiedź.\nStrach przychodzi po. Jasność — przed.\nJeśli jasność jest — idź.\n— Stan Ari\nSŁOWA: ~1 080\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 17, "text": "BLOK II · SZUM\ngdzie szukałem — i dlaczego nie znalazłem\nCałe życie czegoś szukałem.\nI zawsze czułem, że coś jest nie tak.\nŻe jest jakiś właściwy porządek rzeczy —\nale kilka razy z niego zboczyłem.\nI oto co ciekawe:\nkryzys nie przygnębia człowieka — on go przebudza.\nKiedy nie możesz już niczego racjonalizować —\nzaczynasz pytać.\nDlaczego staram się zapełnić pustkę działaniem —\na pustka nigdzie nie idzie?\nZacząłem rozwijać nić.\nI im głębiej kopałem — tym wyraźniej widziałem:\nżyję według algorytmów, które wbudowano we mnie zanim się\nurodziłem.\nKim jesteś. Co jest właściwe, a co nie.\nNawet kiedy przestałem wierzyć w jeden z nich —\ndziałałem według niego.\nI potem zrozumiałem, skąd te algorytmy przyszły.\nZ systemu, który mi przekazano od dziecka.\nReligia. Rodzina. Społeczeństwo.\nWszyscy mówili, jak żyć.\nI żyłem — nie kwestionując.\nTa książka to próba zrozumienia.\nStopniowego rozplątania każdego węzła w tym kłębku,\nktóry nazywa się moje życie.\nZrozumienia, jak to działa.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 18, "text": "I dlaczego jednym wychodzi — a innym nie.\nBędę szczery: nie jestem guru i nie głoszę prawdy.\nPo prostu pokazuję, jak to wygląda z mojego punktu widzenia.\nZacznę od religii.\nBo właśnie ona — to pierwszy system operacyjny,\nktóry instalują bez twojej zgody.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 19, "text": "BLOK II · SZUM\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 20, "text": "ROZDZIAŁ 1 · RELIGIA\nMiałem może osiem lat.\nUkraina, małe miasto.\nMama prowadziła mnie za rękę do cerkwi —\nduża, zimna, złoto na ścianach, ikony wszędzie.\nWszyscy stali cicho i patrzyli w dół.\nTylko w momencie znaku krzyża — oczy szły w górę.\nNa sekundę.\nPotem znowu w dół.\nTeż patrzyłem.\nW górę — kiedy się żegnałem.\nI myślałem: teraz powinno coś się stać.\nTeraz — powinno być czuć.\nNie było czuć.\nI nie wiedziałem — czy to ze mną coś nie tak,\nczy wszyscy tak samo, ale nikt nie mówi.\nNie czułem nic złego.\nPo prostu — pustkę.\nI winę za to, że czuję pustkę tam,\ngdzie wszyscy czują coś wielkiego.\nPrzez lata myślałem, że to mój defekt.\nPóźniej zrozumiałem — to było pierwsze pytanie.\nNie bunt.\nPytanie.\n· · ·\nI jeszcze jedno pytanie, które niosłem z dzieciństwa i długo nie\npotrafiłem nazwać.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 21, "text": "Jeśli Bóg to dobro — to dobro równa się radość.\nProsta logika.\nAle kiedy wchodziłem do cerkwi — czułem smutek.\nCiemność. Strach.\nCoś, co mówiło: jesteś mały, jesteś winny, uważaj.\nI myślałem: dlaczego to światło jest takie ciemne?\nDlaczego miejsce, które powinno być najbliżej miłości —\npachnie strachem?\nTo pytanie zostało we mnie na lata.\nBez odpowiedzi.\nAle właśnie ono — oddzieliło instytucję od wiary.\nJedno od drugiego.\n· · ·\nChodziłem do cerkwi już jako dorosły.\nNie raz — wiele razy.\nI za każdym razem wychodziłem z tym samym poczuciem co w\ndzieciństwie —\npusto.\nI zaraz po pustce — wstyd.\nJakbyś przyszedł na spotkanie i nie znał hasła.\nWszyscy dookoła znają — a ty stoisz i udajesz, że też wiesz.\nPatrzyłem na ludzi.\nWykonywali zasady.\nŻegnali się — kiedy trzeba.\nKlękali — kiedy trzeba.\nCałowali ikony.\nSłuchali słów, których nie rozumieli —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 22, "text": "bo cerkiewnosłowiański to nie ten język, którym myślisz rano\nprzy kawie.\nI myślałem: to są zasady, które zrobili ludzie.\nNie Bóg.\nLudzie. Z jakimś celem. W jakimś czasie.\nI teraz inni ludzie te zasady wykonują — bo tak trzeba.\nAle gdzie tu Bóg?\nDuchowny czyta modlitwę. Ale dlaczego jest święty?\nKto zdecydował?\nI dlaczego jest ojcem — nieznajomy człowiek,\nktóry nie ma żadnego związku z moim życiem.\nA potem widziałem, jak ci sami ludzie wychodzą po\nnabożeństwie.\nŚwięconka pobłogosławiona.\nI tego samego wieczoru — piją tak, że następnego dnia wstyd\npatrzeć.\nNie oceniam. Ale pytam:\nco dało im to nabożeństwo?\nCo się zmieniło w środku?\n· · ·\nI jeszcze coś, co zauważyłem i nie mogłem odzobaczyć.\nKobiety w cerkwi przykrywały głowy.\nObowiązkowo. Bez wyjątków.\nTłumaczono mi — żeby Bóg nie widział grzechów. Żeby przyjść\nczystą.\nMężczyźni stali z odkrytą głową.\nDługo myślałem o tej różnicy.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 23, "text": "Jeśli głowa zakryta — żeby ukryć grzech —\nznaczy, że kobieta jest bardziej grzeszna?\nAlbo grzeszna z założenia — po prostu dlatego, że jest kobietą?\nAle mężczyzna nic nie ukrywa.\nStoi otwarcie. Przed tym samym Bogiem.\nCo jest nie tak z tą logiką?\nTo nie teologia.\nTo nierówność wbudowana w rytuał.\nZwykła biologia — płeć, z którą się urodziłaś —\njuż czyni cię bardziej grzeszną.\nJeszcze przed pierwszym czynem. Jeszcze przed pierwszym\nsłowem.\nI zacząłem widzieć szerszy obraz.\nReligia w takiej formie to nie równość przed Bogiem.\nTo hierarchia — w której jedni są bliżej świętości, a inni z\nzałożenia niżej.\nGdzie zamiast partnerstwa zbudowany jest patriarchat.\nGdzie zamiast „jesteśmy razem\" — „ona musi przykryć, a on\nmoże stać swobodnie\".\nDlaczego tak się stało. Kto to zdecydował.\nI czy w ogóle można zbudować inaczej —\no tym jeszcze porozmawiamy. To osobny i duży temat.\n· · ·\nObserwowałem ludzi w cerkwi.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 24, "text": "t\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 25, "text": "Nie modliłem się — obserwowałem.\nI zauważyłem jedną rzecz, której nie mogłem odzobaczyć.\nWybierali ikony zamiast zdjęcia własnego dziadka.\nNieznajomy człowiek na złotym tle — święty.\nA ten, który dał ci oczy, charakter, sposób trzymania łyżki —\ngdzieś na półce pod kurzem albo w ogóle zapomniany.\nSystem przekonał ludzi, żeby modlili się do cudzego rodu —\ni zapomnieli o własnym.\nTo nie bluźnierstwo.\nTo pytanie o priorytety.\nJeśli Bóg to więź —\nto dlaczego zrywamy tę najbliższą —\ni zastępujemy ją dekoracją?\n· · ·\nWierzę w Boga. Zawsze wierzyłem.\nAle nie wierzę, że Bóg słyszy duchownego lepiej niż słyszy\nmnie.\nNie wierzę, że moja szczera myśl w ciszy\njest gorsza niż odczytana formuła w odpowiednim miejscu.\nNie wierzę, że miłość do czegoś większego potrzebuje\npośrednika z licencją.\nReligia i Bóg — to dwie różne rzeczy.\nZrozumiałem to nie z książki.\nPo prostu pewnego dnia wyszedłem z cerkwi —\ni nie poczułem już potrzeby, żeby wracać.\nNie dlatego, że straciłem wiarę.\nDlatego, że znalazłem różnicę.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 26, "text": "· · ·\nAle był jeden moment.\nMiałem czternaście lat.\nUmierał dziadek.\nPierwszy bliski mi człowiek — który odchodził na zawsze.\nNie czytałem modlitwy. Nie znałem słów.\nPo prostu krzyczałem w środku —\nnie do systemu, nie do zasad —\ndo czegoś, co miało być większe niż śmierć.\nNie prośba. Nie rytuał.\nPo prostu — nie zabieraj.\nTeraz rozumiem, że to dziwne.\nWszyscy tam idziemy.\nAle wtedy miałem czternaście lat.\nI potrzebowałem, żeby ktoś usłyszał.\nDziadek odszedł.\nI właśnie wtedy zrozumiałem różnicę.\nNie przez książki. Przez ból.\nMiędzy formą — a tym żywym krzykiem,\nktóry nie potrzebuje ani słów, ani pozwolenia.\n· · ·\nKiedy człowiek szuka odpowiedzi — dają mu system.\nKiedy szuka Boga — proponują mu rytuał.\nAle co, jeśli połączenie zawsze było bezpośrednie?\n— Stan Ari\n· · ·\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 27, "text": "Ale szczerość wymaga więcej.\nBo moja pozycja nie jest neutralna — i muszę to powiedzieć\nwprost.\nNie mówię o konkretnej religii.\nNie o konkretnej książce.\nO zasadzie.\nKrucjaty — zabójstwa pod sztandarem Chrystusa.\nInkwizycja — tortury i palenie ludzi w imię Bożej miłości.\nDżihad jako broń w rękach polityków — śmierć w imię Allaha.\nHinduski nacjonalizm — rzeź w imię bogów.\nRóżne imiona. Różne książki. Jeden schemat:\nczłowiek zabija człowieka — i mówi, że tak chce Bóg.\nTej logiki nie przyjmuję.\nNie dlatego, że jestem ateistą — nie jestem ateistą.\nAle dlatego, że ma ona fundamentalny błąd.\nJeśli istnieje Stwórca —\ni jeśli jest pierwszą przyczyną życia —\nto jego natura jest tworzenie, a nie niszczenie.\nDobro nie może rodzić zła jako narzędzia.\nEnergia, która stworzyła wszechświat,\nnie potrzebuje ludzkiej krwi, żeby siebie potwierdzić.\nDlatego mam prosty kryterium:\njeśli religia pozwala człowiekowi zabijać w imię Boga —\nta religia nie mówi już w imieniu Stwórcy.\nMówi w imieniu tych, którzy nią zarządzają.\nTo może być strach, władza, polityka — ale nie Bóg.\nNie mówię, że każdy wierzący taki jest.\nWiększość ludzi, którzy się modlą —\nmodlą się o pokój, o zdrowie, o bliskich.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 28, "text": "To jest prawdziwe i czyste.\nAle instytucja, która błogosławi zabójstwo —\nzdradziła tych ludzi jako pierwsza.\nMój sceptycyzm nie jest skierowany przeciwko Bogu.\nJest skierowany przeciwko tym, którzy używają jego imienia\njako broni.\nNie atakuję Boga.\nBronię go — przed tymi, którzy przykrywają się jego imieniem\ndla własnych ciemnych celów.\nJeśli jest tu coś świętego — to właśnie to rozróżnienie.\nMiędzy Stwórcą a tymi, którzy handlują jego imieniem.\n· · ·\nDługo próbowałem zrozumieć — gdzie dokładnie pęka ta\nkonstrukcja.\nCzytałem. Dużo.\nSocjolodzy mówią, że instytucja religijna to mechanizm\nintegracji.\nŻe rytuał łączy ludzi wokół wspólnego symbolu.\nNie prawdy — symbolu.\nTo nie cynizm. To obserwacja.\nEmocja, którą odczuwa tłum w soborze — jest prawdziwa.\nAle może nie chodzić o Boga.\nMoże chodzić o to, że nie jesteś sam.\nI zrozumiałem, dlaczego w dzieciństwie czułem pustkę.\nNie chciałem symbolu.\nChciałem połączenia.\nŻywego. Bezpośredniego. Bez pośrednika.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 29, "text": "Bo pośrednik — to cały system.\nDuchowny bliżej Boga. Ty — dalej.\nPotrzebujesz oczyszczenia. Spowiedzi. Pokuty.\nHierarchia dostępu do czegoś,\nco miało być darmowe i bezpośrednie.\n· · ·\nCzytałem o tym, jak teksty się zmieniały.\nNie teoria spiskowa — dokumentalnie.\nSetki tysięcy wariantów między rękopisami.\nKopiarze dodawali. Usuwali. Dostosowywali do czasu i władzy.\nTo nie niszczy idei Boga.\nAle oznacza, że książka, którą ci dają jako absolutną —\nbyła pisana przez ludzi.\nZ ich lękami i ich interesami.\nI wtedy pytasz:\nmoralność, którą mi przekazali — skąd pochodzi?\nZ głosu w środku —\nczy z głosu z zewnątrz, który nauczył się brzmieć jak twój\nwłasny?\nRóżnica jest ogromna.\nJeśli moralność zewnętrzna — słuchasz się, bo się boisz.\nJeśli wewnętrzna — działasz, bo rozumiesz.\nJedno trzyma na łańcuchu.\nDrugie — czyni cię człowiekiem.\nNie mówię, że religia jest niepotrzebna.\nLudzie, którzy znajdują w niej siłę i miłość — widzę to.\nTo jest prawdziwe.\nAle jest różnica między wiarą a instytucją.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 30, "text": "Między Bogiem a tymi, którzy wystawiają rachunki w jego\nimieniu.\nPrawdziwa wiara nie boi się pytań.\nPrzez nie staje się silniejsza.\n· · ·\nTo mój wybór.\nTwój — twój.\n· · ·\nMyślałem o tym później — za kierownicą.\nSzczecin w nocy, miasto płynie za oknem.\nPasażer milczał.\nI w tej ciszy pytanie zostało — proste i niezamknięte:\ngdzie kończy się instytucja, a zaczyna Bóg?\n· · ·\nAle system nie tylko daje ci Boga i rytuał.\nDaje ci jeszcze jedno —\npoczucie, że urodziłeś się już winny.\nSkąd ono pochodzi.\nI dlaczego tak trudno się go pozbyć?\nZMIANY:\n[1] \"Kod\" — dodano wielką literę
