<!DOCTYPE html>
<html lang="uk" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="google" content="notranslate">
<title>STAN ARI — Online Reader</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050403;
  --gold:#d8af63;
  --gold2:#f4d996;
  --text:#fff8ec;
  --border:rgba(216,175,99,.22);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,serif;overflow:hidden}
body{background:radial-gradient(circle at 50% 0%,rgba(216,175,99,.12),transparent 35%),linear-gradient(180deg,#100b07,#050403 65%)}
button,a{font-family:Georgia,serif;text-decoration:none}
.app{height:100%;display:grid;grid-template-rows:auto auto 1fr auto}
.topbar{
  min-height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:12px 22px;
  background:rgba(6,4,3,.94);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.logo{font-size:13px;letter-spacing:.28em;font-weight:900;white-space:nowrap}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn{
  min-height:38px;padding:0 14px;border-radius:999px;border:1px solid var(--border);
  background:rgba(255,255,255,.045);color:var(--text);font-weight:900;cursor:pointer;
}
.btn.active,.btn.gold{background:linear-gradient(135deg,#fff0bc,#d8af63,#a87531);color:#120c06;border-color:transparent}
.status{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  min-height:42px;padding:8px 22px;background:rgba(5,4,3,.72);
  color:var(--gold2);font-size:13px;border-bottom:1px solid rgba(216,175,99,.13)
}
.reader-wrap{min-height:0;overflow:auto;padding:26px 20px 34px;scroll-behavior:smooth}
.reader-wrap::-webkit-scrollbar{width:11px}
.reader-wrap::-webkit-scrollbar-track{background:#0a0705}
.reader-wrap::-webkit-scrollbar-thumb{background:rgba(216,175,99,.45);border-radius:999px}
.page-shell{
  margin:0 auto 28px;
  width:min(100%, var(--page-width, 1120px));
  border-radius:18px;
  background:#111;
  box-shadow:0 28px 90px rgba(0,0,0,.58);
  border:1px solid rgba(216,175,99,.12);
  overflow:hidden;
}
.page-shell img{
  width:100%;
  height:auto;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
  background:#f5ead6;
}
.bottom{
  min-height:70px;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:12px 18px;background:rgba(5,4,3,.96);border-top:1px solid var(--border)
}
.progress{width:min(42vw,520px);height:7px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#fff0bc,#d8af63,#a87531)}
@media(max-width:760px){
  html,body{overflow:auto;height:auto;min-height:100%}
  .app{height:auto;min-height:100vh;display:block}
  .topbar{display:grid;grid-template-columns:1fr;align-items:start;padding:10px 12px}
  .controls{justify-content:flex-start}
  .status{padding:8px 12px;display:grid}
  .reader-wrap{padding:12px 8px 90px;overflow:visible}
  .bottom{position:fixed;left:0;right:0;bottom:0;z-index:10;min-height:66px}
  .progress{width:28vw}
  .btn{min-height:36px;padding:0 12px;font-size:13px}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">STAN ARI</div>
    <div class="controls">
      <button class="btn active" data-lang="ua">UA</button>
      <button class="btn" disabled title="Підключимо після перевірки UA">EN</button>
      <button class="btn" disabled title="Підключимо після перевірки UA">PL</button>
      <button class="btn" id="fitBtn">Fit</button>
      <button class="btn active" id="wideBtn">Wide</button>
      <button class="btn" id="bigBtn">Big</button>
      <a class="btn" href="index.html">← На сайт</a>
    </div>
  </header>

  <div class="status">
    <div id="statusText">THE LIFE OPERATOR · UA · сторінка 1 / 138</div>
    <div>Сторінки з PDF · без Google Drive · без кнопки скачування</div>
  </div>

  <main class="reader-wrap" id="reader">
    <div class="page-shell" id="pageShell">
      <img id="pageImg" src="pages/ua/page-001.jpg" alt="THE LIFE OPERATOR page" draggable="false">
    </div>
  </main>

  <footer class="bottom">
    <button class="btn" id="prevBtn">← Назад</button>
    <div class="progress"><span id="bar"></span></div>
    <button class="btn gold" id="nextBtn">Далі →</button>
  </footer>
</div>

<script>
const TOTAL = 138;
let page = Number(localStorage.getItem("stanari_ua_page") || 1);
const reader = document.getElementById("reader");
const img = document.getElementById("pageImg");
const statusText = document.getElementById("statusText");
const bar = document.getElementById("bar");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function pagePath(n){
  return "pages/ua/page-" + String(n).padStart(3,"0") + ".jpg";
}

function setMode(mode){
  document.querySelectorAll("#fitBtn,#wideBtn,#bigBtn").forEach(b=>b.classList.remove("active"));
  if(mode === "fit"){
    document.documentElement.style.setProperty("--page-width","860px");
    document.getElementById("fitBtn").classList.add("active");
  }
  if(mode === "wide"){
    document.documentElement.style.setProperty("--page-width","1120px");
    document.getElementById("wideBtn").classList.add("active");
  }
  if(mode === "big"){
    document.documentElement.style.setProperty("--page-width","1320px");
    document.getElementById("bigBtn").classList.add("active");
  }
  localStorage.setItem("stanari_reader_mode",mode);
}

function render(){
  if(page < 1) page = 1;
  if(page > TOTAL) page = TOTAL;
  img.src = pagePath(page);
  statusText.textContent = "THE LIFE OPERATOR · UA · сторінка " + page + " / " + TOTAL;
  bar.style.width = ((page / TOTAL) * 100) + "%";
  prevBtn.disabled = page <= 1;
  nextBtn.disabled = page >= TOTAL;
  localStorage.setItem("stanari_ua_page", page);
  reader.scrollTo({top:0, behavior:"smooth"});
  preload(page+1);
  preload(page-1);
}

function preload(n){
  if(n < 1 || n > TOTAL) return;
  const im = new Image();
  im.src = pagePath(n);
}

prevBtn.onclick = () => { page--; render(); };
nextBtn.onclick = () => { page++; render(); };
document.getElementById("fitBtn").onclick = () => setMode("fit");
document.getElementById("wideBtn").onclick = () => setMode("wide");
document.getElementById("bigBtn").onclick = () => setMode("big");

document.addEventListener("keydown", e => {
  if(e.key === "ArrowRight") { page++; render(); }
  if(e.key === "ArrowLeft") { page--; render(); }
});

let startX = null;
document.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, {passive:true});
document.addEventListener("touchend", e => {
  if(startX === null) return;
  const dx = e.changedTouches[0].clientX - startX;
  if(dx < -60) { page++; render(); }
  if(dx > 60) { page--; render(); }
  startX = null;
}, {passive:true});

setMode(localStorage.getItem("stanari_reader_mode") || "wide");
render();
</script>
</body>
</html>
