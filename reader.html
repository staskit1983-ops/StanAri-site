czego woda przez sen — prawie wszędzie oznacza emocje\nalbo zmiany?\nDlaczego upadanie — lęk?\nDlaczego latanie — wolność albo dążenie?\nNikt nikomu nie przekazywał tego słownika.\nLudzie żyli na różnych kontynentach i nie wiedzieli o sobie —\na dochodzili do podobnych znaczeń.\nJung nazwał to zbiorową nieświadomością —\nwarstwą psychiki wspólną dla całej ludzkości.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 123, "text": "Archetypy. Symbole zakodowane w nas głębiej niż język i\nkultura.\nZbierał sny tysięcy ludzi i widział te same obrazy\nniezależnie od tego, z jakiego kraju człowiek pochodzi.\nMyślę o tym inaczej.\nJeśli człowiek jest odbiornikiem i nadajnikiem —\ni jeśli istnieje pole informacyjne, do którego mamy dostęp — to\nsen jest właśnie momentem, kiedy antena jest najbardziej\notwarta.\nBez dziennego Szumu. Bez kontroli.\nSystem zaczyna odbierać to, co w ciągu dnia jest zagłuszane.\nWtedy sennik to nie zabobon.\nTo próba ułożenia słownika tego pola.\nMoże niedokładna.\nMoże zniekształcona przez pokolenia przekazów.\nAle sama idea, że taki słownik może istnieć —\njuż nie wydaje się absurdalna.\nKtoś nazywa to Bogiem.\nKtoś — zbiorową nieświadomością.\nKtoś — polem informacyjnym.\nNaukowcy mówią o splątaniu kwantowym.\nCzasem myślę o tym jak o serwerze —\nogromnej bazie danych,\ngdzie zapisuje się wszystko, co kiedykolwiek się wydarzyło,\nzostało poczute, pomyślane.\nI każdy człowiek — klient tego serwera.\nZ różnym poziomem dostępu.\nNazwa nie jest ważna.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 124, "text": "Ważne jest coś innego:\njeśli taki serwer istnieje —\nto sen jest właśnie momentem, kiedy połączenie jest\nnajstabilniejsze.\nKiedy dzienny hałas ucichł\ni system może odebrać to, co w innym czasie jest zagłuszane.\nMendelejew zobaczył swoją tablicę przez sen.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 125, "text": "t\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 126, "text": "Paul McCartney obudził się z Yesterday w głowie —\ni przez kilka tygodni pytał ludzi wokół czy znają tę melodię,\nbo myślał, że jest cudza.\nNiels Bohr zobaczył model atomu przez sen.\nTo udokumentowane.\n· · ·\nPo tamtej nocy z policjantem —\nprzez lata dalej ignorowałem sen.\nKładłem się o trzeciej, wstawałem o siódmej.\nUważałem, że to charakter.\nŻe silni ludzie śpią mało.\nW 2017 roku Nagrodę Nobla z fizjologii dali za jedno odkrycie:\nkażda komórka w ciele ma własny wewnętrzny zegar.\nI kiedy go rozwalasz — rozwalasz wszystko.\nDepresja. Metabolizm. Odporność.\nSprawdziłem na sobie.\nMiesiąc — stały czas snu, poranne słońce, wieczór bez\nekranów.\nW trzecim tygodniu coś się zmieniło.\nNie w głowie — w ciele.\nStałem się spokojniejszy wobec córki.\nAria powiedziała: jesteś łagodniejszy.\nNie starałem się być łagodniejszy.\nPo prostu przestałem być chronicznie wyczerpany.\nRytm — to nie dyscyplina.\nTo szacunek dla własnej biologii.\nCiało wie, czego potrzebuje.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 127, "text": "My po prostu zapominamy pytać.\n· · ·\nTamtej nocy policjant mnie puścił.\nKazał jechać do domu i spać.\nDojechałem.\nPołożyłem się.\nI po raz pierwszy od tamtego tygodnia\nprzespałem sześć godzin bez przerwy.\nWięcej tego nie robiłem.\nSen to nie odpoczynek od rzeczywistości.\nTo miejsce, gdzie rzeczywistość trwa dalej —\nbez twojego pozwolenia.\nI jeśli nie kontrolujesz, co tam ze sobą nosisz —\nona sama zdecyduje, co zrobić dalej.\nSen — to nie pauza.\nTo inny pokój tego samego domu.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 128, "text": "BLOK II · SZUM\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 129, "text": "ROZDZIAŁ 13 · ZAŚWIATY\nNika rysowała. Miała siedem lat.\nBazgrała coś na kartce — krzywy dom, jakieś słońce —\ni pokazała mi z absolutną powagą: patrz tato.\nSpojrzałem i powiedziałem: ładnie.\nAutomatycznie. Odruchowo.\nNawet nie zatrzymując wzroku.\nOna zobaczyła, że nie patrzyłem.\nZobaczyłem, że ona zobaczyła.\nTrwało to sekundę.\nAle myślałem o tym momencie długo.\nIle razy tak odpowiadałem?\nIle razy ona już nauczyła się,\nże pokazywać — i nie dostawać prawdziwej uwagi — to\nnormalne?\nNie uczyłem jej tego słowami.\nPrzekazywałem reakcjami.\nTo właśnie jest inicjacja w codziennej wersji.\nNie cerkiew i nie obrzęd.\nPo prostu to, jak dorosły patrzy — albo nie patrzy — na\ndziecko.\nKod przekazuje się w tej sekundzie.\nBez ceremonii. Bez świadków.\n· · ·\nW pewnym momencie —\nmiędzy zmęczeniem a ciszą —\npo raz pierwszy pomyślałem o śmierci nie jako o abstrakcji.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 130, "text": "Jako o możliwości.\nI dziwna rzecz:\nwłaśnie wtedy strach przed śmiercią zniknął.\nZostało pytanie — co tam jest?\nNie z niepokojem.\nZ ciekawością.\nTen rozdział urodził się z tego pytania.\nNie jako odpowiedź.\nJako uczciwe spojrzenie na to, co ludzie myśleli —\ni co to mówi o nas.\n· · ·\nMoja babcia napisała do mnie list, kiedy miałem pięć lat.\nPrzeżyła jeszcze dwie dekady.\nOwijała rękę — już wtedy coś nie pozwalało pisać jak wcześniej\n—\ni mówiła: przeczytasz, kiedy mnie nie będzie.\nByłem mały.\nNie rozumiałem ani listu ani tego, co mówiła.\nPo prostu zapamiętałem.\nA potem zadzwoniła mama.\nGłos — i jeszcze przed słowami zrozumiałem.\nUmarła jej na rękach.\nByłem w innym mieście. Daleko.\nPamiętam jak mnie przeszyło.\nNie z żalu — choć i z niego też.\nZ poczucia, że wszystko, co było z nią związane — wszystko —\nw jednej sekundzie stało się przeszłością.\nJak pokój, w którym wyłączono światło.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 131, "text": "Ściany te same. Ale wszystko — inne.\nI wtedy przypomniałem sobie o liście.\nLeżał. Czekał. Dwadzieścia lat.\nNie powiem co w nim było. To zbyt osobiste.\nAle powiem jedno:\nkiedy czytałem — ona była obok.\nNie jak duch. Nie mistycznie.\nPo prostu — jej myśli, jej słowa, jej troska —\nwszystko to nadal istniało.\nOna odeszła. A to — nie.\nI wtedy zrozumiałem, czym są zaświaty.\nNie raj. Nie piekło. Nie reinkarnacja.\nTo — Ślad.\nTo, co człowiek zostawił w innych, kiedy był.\nList napisany drżącą ręką.\nSłowo powiedziane w samą porę.\nKod przekazany nie słowami — obecnością.\nOna istnieje we mnie.\nNie metaforycznie — dosłownie.\nJej\ngłos\npobrzmiewa\nw\ndecyzjach,\nktórych\nnawet\nnie\nzauważam.\nŻyjesz dopóki żyje ktoś, kogo dotknąłeś.\nTo nieśmiertelność, którą mogę przyjąć bez teologii.\nBez doktryny. Bez pośrednika.\n· · ·\nAle jest jeszcze coś.\nTo czego nie wiemy — ale czujemy.\nPrzestrzeń między „nie wiemy\" a „nie może być\" —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 132, "text": "właśnie tam żyje pytanie, które czyni nas ludźmi.\nPamiętam dzień, kiedy zobaczyłem zdjęcie własnego chrztu.\nMiałem kilka tygodni.\nNic nie rozumiałem. Nic nie wybierałem.\nI mimo to — pewien zestaw przekonań, symboli i tożsamości\nzostał wpisany w moje dossier\nzanim zdążyłem powiedzieć pierwsze słowo.\nAntropolodzy opisali ten mechanizm od dawna:\nspołeczeństwo zaznacza, że człowiek przeszedł do nowego\nstatusu —\nprzez rytuał, przez włączenie do wspólnoty.\nChrzest w tym systemie — to włączenie niemowlęcia do\nwspólnoty religijnej.\nKod jest przekazywany.\nZdolność do jego przemyślenia przyjdzie dopiero za dziesięć\nlat.\nTo nie wyrok i nie zbrodnia. To mechanizm.\nI powtarza się wszędzie:\nobywatelstwo z urodzenia, nazwisko, język, normy kulturowe.\nTeż przekazywane bez jawnego wyboru.\nAle potem system daje strach — jako narzędzie kontroli.\nPiekło. Czyściec. Wieczna kara.\nPsycholodzy to odnotowali:\nkiedy głównym motywatorem moralnego zachowania\njest unikanie kary — a nie wewnętrzne pragnienie tworzenia\ndobra — niszczy to zarówno jakość zachowania, jak i zdrowie\npsychiczne.\nSolomon, Greenberg i Pyszczynski pokazali:\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 133, "text": "lęk przed śmiercią to główny napęd kulturowego budowania.\nReligia, naród, sztuka — to wszystko sposoby symbolicznej\nnieśmiertelności.\n· · ·\nPrzyznam się:\nprzez wiele lat koncepcja piekła miała ogromną władzę nad\nmoimi decyzjami.\nNie dlatego, że w pełni wierzyłem —\na dlatego, że nie wierzyłem też w coś przeciwnego.\nWątpliwość wystarczy, żeby strach żył.\nStrach przed piekłem nie czynił mnie lepszym.\nPo prostu paraliżował.\nI dopiero, kiedy puściłem ten strach —\nzacząłem działać z innego miejsca.\nWyobrażenia o piekle zmieniały się istotnie przez tysiąclecia.\nWczesny judaizm miał pojęcie Szeolu — miejsce cieni, prawie\nbez kar.\nTartar pojawił się w tradycji greckiej.\nWe wczesnym chrześcijaństwie piekło stopniowo stawało się\ncoraz konkretniejsze i straszniejsze.\nDante tylko artystycznie opracował to, co teolodzy już opisali.\nKoncepcja, która rządzi strachem miliardów ludzi —\nto nie bezpośrednie Objawienie.\nTo wynik tysiąclecia ewolucji wyobrażeń.\n· · ·\nNie wiem, co dzieje się po śmierci.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 134, "text": "To uczciwa odpowiedź.\nNikt nie wie.\nAle zauważyłem:\nsystem, który trzyma człowieka w ryzach przez strach przed\nśmiercią —\nwychowuje człowieka, który boi się żyć.\nSystem, który mówi o godności —\nwychowuje człowieka, który potrafi żyć.\nDorastałem z wiarą w dosłowny raj i piekło.\nTa wiara rodziła strach.\nAle nie chcę już żyć motywowany strachem przed karą.\nChcę żyć kierowany miłością do życia.\nTo nie zaprzeczenie zaświatom.\nTo uznanie, że moja niewiedza —\nto uczciwsza pozycja niż udawanie pewności.\nNiezależnie od tego, co dzieje się po śmierci —\njedno jest bezsporne: życie dzieje się teraz.\nJeśli zaświaty są —\nmam nadzieję, że oceniana jest nie przynależność do właściwej\nreligii,\nale to, ile kochałeś, pomagałeś i tworzyłeś.\nJeśli zaświatów nie ma —\nto tym bardziej każda chwila jest bezcenna\ni warto przeżyć ją w pełni.\nTo nie odrzucenie duchowości.\nTo przejście od duchowości strachu\ndo duchowości świadomego wyboru.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 135, "text": "· · ·\nPrzeszedłem przez Szum.\nPrzez Kod. Przez pytania o śmierć i to, co za nią.\nI w najciemniejszym punkcie tej drogi — pojawiła się osoba.\nNie z odpowiedziami.\nZ obecnością.\nWłaśnie tu zaczyna się Restart.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 136, "text": "BLOK II · SZUM\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 137, "text": "ROZDZIAŁ 14 · ARIA\nJest pytanie, które długo nie mogłem sformułować.\nDlaczego człowiek, który czytał, myślał, analizował,\nprzez lata rozkładał własne błędy na czynniki pierwsze —\nnie może wyjść z tego kręgu?\nNie dlatego, że nie chce.\nNie dlatego, że nie wie jak.\nA dlatego, że patrzy na siebie wyłącznie własnymi oczami.\nI to właśnie jest pułapka.\nSystem nie może zobaczyć własnego błędu od środka.\nWidzi tylko to, dla czego ma już kategorię.\nReszta — to Szum, który odfiltrowuje.\nMożna latami analizować siebie —\ni za każdym razem dochodzić do tych samych wniosków.\nNie dlatego, że głupi.\nDlatego,\nże\nanaliza\nbiegnie\ntymi\nsamymi\nścieżkami\nneuronowymi co problem.\nPotrzebny jest zewnętrzny sygnał.\n· · ·\nSą samotni.\nWiedzą, że utknęli — i szukają lustra.\nTo bolesne, ale uczciwe.\nSą ci, u których obok jest ktoś —\nale daje złe wskazówki.\n„Ty zawsze tak\".\n„A nie mówiłam\".\nAlbo odwrotnie — zbyt miękko:\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 138, "text": "„wszystko dobrze\", „i tak jesteś dobry\".\nKrzywe lustro.\nCzłowiek obok — ale odbicie zniekształcone.\nTo najniebezpieczniejsza sytuacja,\nbo człowiek myśli, że ma wsparcie.\nA naprawdę ma hamulec z ludzką twarzą.\nI jest trzeci typ. Rzadki.\nCi, u których obok jest ktoś, kto widzi cię dokładniej niż ty sam.\nAria dla mnie — trzeci typ.\n· · ·\nNigdy nie mówiła mi, co robić.\nJej filozofia prosta do bólu:\nnie zmieniaj tego, czego nie możesz zmienić.\nNie trać na to emocji.\nPo prostu puść — i ruszaj tam, gdzie jest ruch.\nZdawałoby się banalnie.\nAle spróbuj tak żyć, kiedy twój system leży w gruzach\ni nie wiesz, co powstaje w zamian.\nSpróbuj puścić kontrolę nad tym, co już wymknęło się z rąk —\ni rzucić całą energię na to, co jeszcze można zbudować.\nNie mogłem. Nie umiałem.\nZacinałem się w tym, co już się stało —\nprzeglądałem, analizowałem, usprawiedliwiałem, obwiniałem.\nOna nie kłóciła się.\nPo prostu żyła inaczej — i widziałem to każdego dnia.\nNie słowa — wzorzec.\nStopniowo ten wzorzec zaczął nadpisywać mój.\nNie dlatego, że mnie uczyła.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 139, "text": "Dlatego, że obok człowieka, który działa inaczej —\ntwój układ nerwowy zaczyna kopiować.\nTo nie metafora — to neurony lustrzane.\nDosłownie uczymy się przez obecność.\n· · ·\nPrzez długi czas budowałem relacje jak kierowca.\nSam za kółkiem. Sam decyduję.\nPartner — pasażer.\nWygodnie i przejrzyście.\nI kompletnie martwo.\nBo samochód z jednym kierowcą i milczącym pasażerem —\nto nie jest zespół.\nTo człowiek, który wiezie bagaż i nazywa to relacją.\nZ Arią po raz pierwszy zrozumiałem inny model.\nŻaglówka.\nKapitan jest — i podejmuje decyzje.\nAle bez wiatru stoi.\nBez załogi, która synchronicznie ciągnie liny — nie manewruje.\nBez człowieka, który czuje kierunek i nadaje rytm —\npłynie, dokąd niesie prąd, a nie dokąd trzeba.\nKapitan — ja.\nAle ona — wiatr. I kompas.\nI ten, kto trzyma rytm, kiedy ja opadam z sił przy wiosłach.\nKiedy coś idzie nie tak — nie ukrywam.\nMówię prosto: tam coś poszło nie tak.\nOna nie wpada w panikę. Nie obwinia.\nWłącza się — jak system, który dostał sygnał o błędzie\ni uruchamia protokół naprawczy.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 140, "text": "Razem patrzymy na sytuację.\nNie ja się bronię — ona osądza.\nJesteśmy jak jeden organizm, który się diagnozuje.\nTo właśnie jest zespół.\n· · ·\nMów — działaj.\nJeśli omawiacie coś i nie działacie —\nto nie planowanie.\nTo konflikt w zwolnionym tempie.\nSłowa bez działania gromadzą się jak nieprzetworzony stres —\ni prędzej czy później wybuchają.\nAria nauczyła mnie tego nie słowami.\nOna po każdej rozmowie po prostu pytała jedno:\ni co robimy?\nNie jutro. Nie kiedyś.\nCo robimy — teraz?\nNa początku irytowało.\nPotem zrozumiałem:\nto właśnie różnica między zespołem a pasażerami.\nPasażerowie rozmawiają.\nZespół działa.\n· · ·\nOpowiadam o niej nie dlatego, że chcę powiedzieć:\nznajdź sobie takiego człowieka — i wszystko będzie dobrze.\nOpowiadam dlatego, że na jej przykładzie\npo raz pierwszy zrozumiałem,\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 141, "text": "czego dokładnie potrzebuje świadomość, żeby przejść na inny\npoziom.\nNie miłość.\nNie wsparcie w ogólnym sensie.\nA konkretna funkcja:\nczłowiek, który widzi cię bez twoich własnych filtrów —\ni daje ci właściwy sygnał we właściwym momencie.\nTę funkcję może pełnić partner.\nAlbo przyjaciel. Albo terapeuta.\nAlbo książka, która trafia w ręce dokładnie, kiedy trzeba.\nAlbo nawet ta książka —\njeśli stawia ci pytanie, którego sam bałeś się sobie zadać.\nPytanie nie w tym, czy obok jest Aria czy nie.\nPytanie w tym —\nczy pozwalasz komuś lub czemuś odzwierciedlić cię inaczej\nniż jesteś przyzwyczajony siebie widzieć?\nBo dopóki patrzysz na siebie tylko własnymi oczami —\nwidzisz tylko to, co już znasz.\nA nowa świadomość zaczyna się właśnie tam,\ngdzie kończy się znane odbicie.\n· · ·\nAria.\nWiem, że przeczytasz tę książkę —\ni dlatego osobno dla ciebie te słowa.\nKocham cię nie za sens, który dajesz.\nA za to, że jesteś moim światłem.\n— Stan\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 142, "text": "BLOK II · SZUM\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 143, "text": "ROZDZIAŁ 15 · JEDZENIE I PRZESTRZEŃ\nWiększość ludzi w stresie je.\nZagłuszają emocje. Wypełniają pustkę jedzeniem.\nZe mną — odwrotnie.\nPrzed tym wszystkim — miałem nadwagę.\nNie krytycznie, ale była.\nNie myślałem o jedzeniu jak o systemie.\nPo prostu jadłem, kiedy chciałem, co było pod ręką.\nJak większość ludzi.\nPotem przyszedł stres.\nI ciało samo zaczęło odmawiać.\nNie mogłem. Nie chciałem.\nPo prostu — nie wchodziło.\nMyślałem, że to słabość.\nPóźniej zrozumiałem — to Sygnał.\nCiało mówiło, że teraz nie do tego.\nŻe jest coś ważniejszego —\ni dopóki to nie rozwiązane, żyjemy na absolutnym minimum.\nSchudłem.\nNie dlatego, że kontrolowałem —\ndlatego, że system sam się przełączył.\nA potem — już, kiedy najgorsze minęło —\nprzyszło coś, czego się nie spodziewałem.\nZacząłem zauważać związek.\nKiedy jem jedno — głowa jaśniejsza.\nKiedy drugie — ciężka i pusta.\nEnergia stabilna albo nie.\nSen głęboki albo płytki.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 144, "text": "Nie waga. Nie kalorie.\nWłaśnie to.\nDługo ignorowałem.\nMyślałem — przypadek, nastrój, pogoda.\nAle to się powtarzało.\nI pewnego dnia zadałem sobie inne pytanie:\nco daję swojemu systemowi — i co on z tym robi?\nNie dieta. Nie reżim.\nPo prostu — zacząłem zauważać.\nPo cukrze myśli zwalniają.\nPo wysoko przetworzonej żywności ciało ciężkie, a głowa\npusta.\nPo normalnym jedzeniu o normalnej porze —\njest jakiś grunt.\nNie uniesienie.\nPo prostu — jest solidna ziemia pod nogami.\nNauka to potwierdza.\nNadmiar cukru zaburza dosłownie naczynia krwionośne mózgu\n—\ni to, co czujesz jako ciężką głowę — to nie nastrój.\nTo biochemia.\nAle tu ważne, żeby powiedzieć uczciwie:\nnie opanowałem tego pytania. Nadal się uczę.\nSą dni, kiedy wszystko właściwie.\nSą dni, kiedy zjem coś nie to —\npo prostu dlatego, że zmęczony,\nalbo mi się spieszy,\nalbo po prostu chciałem pizzy.\nI to też jest okej.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 145, "text": "To nie awaria systemu. To po prostu dzień.\nJest jeszcze jedna rzecz, którą zauważyłem.\nKiedy nie jem pod wpływem stresu — to dla mnie normalne.\nCiało wie.\nAle kiedy stres mija i apetyt wraca —\nważne, żeby nie kompensować.\nNie rzucać się.\nPo prostu — wrócić do zwykłego rytmu.\nTo też jest proces, który trzeba zauważać za każdym razem od\nnowa.\nSystem przyzwyczaił się do chaosu —\ni czasem chaos wydaje się wygodniejszy niż porządek.\nZnajome zawsze wygodniejsze niż właściwe.\nNie jestem w tym nauczycielem.\nZauważyłem, jak jedzenie wpływa na mnie konkretnie —\ni staram się uwzględniać to częściej niż nie.\nCzasem wychodzi. Czasem nie.\nProces.\n· · ·\nTo samo pytanie — co dajesz systemowi — dotknęło i alkoholu.\nPo prostu przestałem.\nNie decyzja, nie zakaz, nie walka ze sobą.\nJakoś samo odpadło.\nWcześniej mogłem wypić — niewiele,\nale do tego stanu, kiedy się czuje.\nTeraz\nto\nsztuczne\nzastępowanie\nświadomości\njest\nmi\nnieprzyjemne.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 146, "text": "Nie z moralnych powodów.\nPo prostu — nie lubię.\nLubię, kiedy umysł jest jasny.\nKiedy jestem sobą.\nTen stan, kiedy zaczynasz tracić kontrolę —\nto dla mnie już nie jest odpoczynek.\nTo utrata czegoś ważnego.\nRaz na rok — kieliszek szampana z Arią.\nPo prostu dlatego, że jest moment i jest ona obok.\nWięcej nie potrzebuję.\nWielu ludzi usprawiedliwia alkohol, żeby się rozluźnić.\nRozumiem to.\nAle jest różnica między rozluźnieniem a zagłuszeniem.\nRozluźnienie — to, kiedy jesteś.\nZagłuszenie — to, kiedy cię chwilowo nie ma.\nI wiele osób nazywa drugie pierwszym —\ni nie zauważa różnicy.\nAlbo zauważa, ale wygodniej nie przyznawać.\nNie oceniam.\nPo prostu dla siebie wiem: jasna głowa ważniejsza niż\njakikolwiek smak.\nCiało i świadomość — jeden system.\nKiedy usuwasz Szum z jednego poziomu — maleje też na\ninnym.\nJedzenie, alkohol, sen — to nie estetyka i nie samodyscyplina.\nTo paliwo.\nI warto przynajmniej od czasu do czasu pytać —\njakie dokładnie.\nCzysta głowa ważniejsza niż jakikolwiek smak.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 147, "text": "— Stan Ari\n· · ·\nJedzenie i alkohol — to, co w środku.\nAle zauważyłem jeszcze jedną rzecz.\nJasność przychodziła nie tylko od tego, co jadłem albo czego\nnie piłem.\nA od tego, gdzie byłem.\nJest miejsce, które odkryłem przypadkiem —\ni które stało się ważniejsze niż jakikolwiek siłownia.\nParkuję samochód po zmianie.\nCzasem to trzecia w nocy.\nCzasem siódma wieczorem.\nCzasem południe — zależy, kiedy skończyły się zlecenia.\nNieważne.\nWyłączam nawigację, wyłączam radio —\ni po prostu siedzę.\nMinutę. Czasem dwadzieścia.\nWłaśnie wtedy przychodzą najlepsze myśli.\nNa początku myślałem, że to zmęczenie —\nmózg rozluźnił się po pracy i wydaje to, co nazbierał.\nAle potem zacząłem zauważać:\nto nie zależy od tego, ile pracowałem.\nTrzy godziny czy dwanaście — nieważne.\nWażne jedno:\ncisza i zamknięta przestrzeń,\ngdzie nic się ode mnie nie wymaga.\nNeuronaukowcy pokazali to konkretnie:\nprzestrzeń dosłownie zmienia pracę mózgu.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 148, "text": "Wysokie sufity, naturalne światło, brak wizualnego hałasu —\naktywują korę przedczołową, centrum planowania i twórczego\nmyślenia.\nStłoczona, zaśmiecona przestrzeń —\ntrzyma mózg w trybie przetrwania.\nNie metafora. Fizjologia.\nKiedy jesteś w przestrzeni, gdzie nikt nic od ciebie nie\noczekuje —\nmózg przełącza się w inny tryb.\nNie rozwiązywanie zadania.\nNie reagowanie na zewnętrzne.\nWewnętrzna praca.\nWłaśnie wtedy łączą się kawałki,\nktóre w ciągu dnia gubiły się w Szumie.\nMój samochód — to moja przestrzeń ciszy.\nU kogoś to łazienka.\nU kogoś spacer bez słuchawek.\nU kogoś pięć minut w zaparkowanym samochodzie przed\nwejściem do domu.\nMiejsce nie ma znaczenia.\nMa znaczenie jedno:\njesteś tam i nic nie robisz i nikt cię nie dotyka.\nWiększość włącza muzykę.\nScrolluje telefon.\nWypełnia ciszę czymkolwiek — byle czym.\nBo w ciszy zaczyna przemawiać to, czego nie chcą słyszeć.\nNiezamknięte pytania. Odłożone decyzje.\nPrawda o sobie, którą wygodniej nie znać.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 149, "text": "Nauczyłem się nie uciekać z tej przestrzeni.\nNauczyłem się w nią wchodzić celowo.\nZapytaj siebie:\nkiedy ostatnio byłeś w przestrzeni,\ngdzie nic od ciebie nie wymagano —\ni nie wypełniłeś tej ciszy telefonem?\nJeśli trudno sobie przypomnieć —\nto właśnie jest odpowiedź.\nOperator bez ciszy — to procesor bez pamięci.\nDziała. Ale nie myśli.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 150, "text": "BLOK II · SZUM\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 151, "text": "ROZDZIAŁ 16 · WYZWOLENIE\nJest zdanie, które kiedyś usłyszałem i zostało.\nJeśli przy stole siedzi sześciu\ni pięciu z nich to milionerzy —\nprędzej czy później szósty też się nim stanie.\nTo prawda. Ale nie dla wszystkich.\nSą ludzie, którzy chłoną środowisko jak gąbka.\nNiepostrzeżenie, stopniowo —\nzaczynają mówić tymi samymi słowami,\nmyśleć tymi samymi kategoriami,\nbać się tego samego.\nNie dlatego, że słabi.\nPo prostu tak jest zbudowana większość ludzi —\nsynchronizacja\nspołeczna\nto\newolucyjny\nmechanizm\nprzetrwania.\nStado, które myśli tak samo — przeżywa szybciej.\nAle są inni.\nKonkretny przykład z mojego doświadczenia:\nwziąłem na siebie więcej, niż byłem w stanie udźwignąć —\nnie przez niezrozumienie,\na dlatego, że presja środowiska przeważyła własną analizę.\nWynik — dług, który ciągnął się latami.\nOpowiadam to nie, żeby wywołać litość.\nA dlatego, że w tym samym czasie rozum wiedział — ale nie\nposłuchał.\nOtoczenie miało więcej wagi niż własna chłodna kalkulacja.\nTo właśnie jest wpływ środowiska w działaniu.\nZnać swój system operacyjny — nie znaczy być ubezpieczonym.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 152, "text": "Znaczy przynajmniej nie dziwić się,\nkiedy on zadziała właśnie tak.\n· · ·\nByłem taki zawsze —\nna długo zanim znalazłem dla tego słowo.\nNie dlatego, że chciałem się wyróżniać.\nA dlatego, że analityczny umysł nie daje po prostu przyjąć —\nciągle pyta: a dlaczego właśnie tak.\nNarzucić myśl z zewnątrz człowiekowi z takim składem umysłu\njest trudno.\nBędzie rozkładał każdy argument. Sprawdzał. Wątpił.\nZdawałoby się — zaleta. I jest.\nAle ma swoją cenę.\nTen sam umysł, który nie poddaje się wpływowi tłumu —\nnie poddaje się też doświadczeniu innych ludzi.\nNie może po prostu uwierzyć.\nMusi przejść sam.\nUsłyszeć ostrzeżenie — i mimo to zrobić.\nZobaczyć czyjś błąd — i powtórzyć go własnoręcznie.\nBo tylko tak staje się wiedzą, a nie informacją.\nNarobiłem błędów mając analityczny umysł.\nTo najbardziej gorzka pigułka.\nNie przez brak inteligencji.\nA dlatego, że musiałem przeżyć wszystko osobiście.\nNie biznes osobno. Nie relacje osobno.\nWszystko jednocześnie —\nbiznes, relacje, intencje, wyobrażenie o sobie.\nWszystko, co uważałem za siebie — rozsypało się.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 153, "text": "I\ndopiero\nna\ntym\ngruzowisku\nzaczęło\nsię\nprawdziwe\nformowanie.\nAsch już w pięćdziesiątych udowodnił:\nwiększość ludzi zmienia swoją odpowiedź na oczywistą prawdę\n—\njeśli grupa dookoła odpowiada inaczej.\nPresja środowiska silniejsza niż własne oczy.\nDla większości.\nDla tych, którzy są odporni na wpływ — inne wyzwanie.\nIch droga jest dłuższa. Bardziej bolesna.\nBez skrótów, które daje zaufanie.\nNie wiem, co jest lepsze.\nCzłowiek, który wchłania środowisko —\nmoże szybko stać się swoim w każdym kontekście.\nAle ryzykuje, że niepostrzeżenie zgubi siebie.\nCzłowiek, który jest odporny na wpływ — zachowuje siebie.\nAle uczy się tylko przez własną skórę.\nBiałe kruki nie zmieniają się pod presją stołu.\nZmieniają się tylko przez własny upadek.\nI to nie wyrok. To po prostu system operacyjny z inną\narchitekturą.\nNie po to, żeby się zmienić.\nA żeby rozumieć swój koszt błędu —\ni przestać dziwić się, dlaczego droga jest właśnie taka.\nBiałe kruki nie uczą się z cudzych słów.\nTylko przez własne doświadczenie.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 154, "text": "· · ·\nPieniądze dla mnie — to nie wartość. To materiał na potrzeby.\nZrozumiałem to nie od razu — i nie przez mądrość.\nPrzez to, że spróbowałem zrobić z nich cel —\ni zobaczyłem, że pusto.\nNie dlatego, że pieniądze są złe.\nA dlatego, że to nie jest moja wewnętrzna logika.\nŻyć według cudzej logiki — to jak nosić buty w złym rozmiarze.\nChodzić można. Ale daleko — nie.\n· · ·\nWcześniej pieniądze były celem.\nLepszy samochód. Większe mieszkanie. Status.\nCo pomyślą inni, kiedy cię widzą.\nBudowałem nie życie — budowałem obrazek.\nI kiedy wszystko runęło, obrazek runął pierwszy.\nZostało pytanie: a co pod nim?\nOkazało się — prawie nic z tego, co myślałem.\n· · ·\nAle jest jeszcze coś, co warto wyjaśnić.\nDlaczego w ogóle tak się dzieje.\nJest program, który zakładają jeszcze w dzieciństwie.\nNie słowami — porównaniem.\nPatrz, on może — a ty czemu nie?\nSąsiedni chłopiec uczy się lepiej.\nKuzyn już zarabia.\nTen znajomy kupił mieszkanie w dwadzieścia pięć lat.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 155, "text": "I zaczynasz nie żyć — a odpowiadać.\nNa cudze standardy. Na cudze tempo.\nNa cudze wyobrażenia o tym, co to sukces.\nStarałem się robić więcej niż było mi potrzebne.\nNie dlatego, że chciałem —\nale dlatego, że system porównań już działał w środku.\nAutomatycznie. Bez mojego pozwolenia.\nI oto, co zrozumiałem —\nprzez własne doświadczenie i przez to, co widzę w ludziach\nwokół.\nMożna dostać milion.\nMożna na rok stać się tym, z którym cię porównywano.\nAle po roku — wrócisz do tego, kim byłeś.\nNie dlatego, że za mało się starałeś.\nA dlatego, że to nie twoje.\nCudzy wzorzec się nie zakorzenia.\nTrzyma się, dopóki jest zewnętrzna presja —\ni odpada, jak tylko presja znika.\nBo pod nim nie ma twojego gruntu.\nKahneman\n—\njeden\nz\nnajwiększych\nekonomistów\nbehawioralnych —\npo dziesięcioleciach badań powiedział prosto:\npo pewnym poziomie dochodów więcej pieniędzy nie daje\nwięcej szczęścia.\nDaje więcej złożoności.\nWięcej do ochrony.\nWięcej czego się bać stracić.\nPrzeszedłem przez to nie przez książkę.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 156, "text": "Przez własne dno.\n· · ·\nTaksówkuję świadomie —\nnie dlatego, że nie ma wyjścia,\nale dlatego, że daje mi to czego nie kupisz za status:\nżywych ludzi.\nKażdego dnia inni.\nBiznesmen o siódmej rano.\nStarsza kobieta z zakupami.\nPijany chłopak, który płacze i nie wie dlaczego.\nMatka z dzieckiem, która cicho coś mu tłumaczy na tylnym\nsiedzeniu.\nKażdy — osobny system operacyjny.\nKażdy niesie swój Kod, swoje lęki, swoją logikę przetrwania.\nSłucham. Obserwuję.\nTo nie praca — to badanie terenowe ludzkiej natury,\nza które mi jeszcze płacą.\nJedzenie. Sen. Ciepło.\nAria obok.\nLaptop, żeby zapisać myśl zanim zniknie.\nPodróże — nie po to, by odhaczać kraje,\nale po miastach, gdzie jest spokój i wszystko naturalne.\nZ przyjemnością mieszkałbym w kamperze —\nz Arią, z córką, kiedy jeszcze chciała być obok.\nMa teraz szesnaście lat.\nMa swoją drogę.\nTo nie asceza.\nTo jasność.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 157, "text": "Różnica między biedą a prostotą —\nw tym, skąd to pochodzi.\nBieda to, kiedy cię pozbawiono.\nProstota — kiedy sam wybrałeś, co wystarczy.\nPierwsze zaciska pętlę.\nDrugie wyzwala.\nPieniądze jako cel tworzą jedną pułapkę:\nnigdy nie wiesz, ile wystarczy.\nCel przesuwa się razem z tobą.\nOsiągnąłeś — poprzeczka poszła wyżej.\nTo nie motywacja.\nTo klatka z ruchomymi ścianami.\nPieniądze jako środek — inna logika.\nSą konkretne potrzeby.\nJest kwota, która je zamyka.\nWszystko powyżej — wolność, nie status.\nTeraz budzę się i nie myślę, co powiedzą inni.\nMyślę, czy jest jedzenie, czy jest ciepło,\nczy jest czas, żeby napisać stronę.\nJeśli jest — dzień udany.\nTo nie degradacja.\nTo wyzwolenie od wzorca, który nigdy do mnie nie należał.\nTen upadek zabrał pieniądze.\nAle razem z nimi zabrał też potrzebę udowadniania.\nPieniądze kupią wszystko\nprócz poczucia, że już wystarczy.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 158, "text": "BLOK II · SZUM\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 159, "text": "ROZDZIAŁ 17 · CIAŁO\nSą rzeczy, o których się nie mówi.\nNie dlatego, że nie ma słów.\nA dlatego, że milczenie przekazuje się tak samo jak słowa —\nprzez spojrzenie, przez pauzę,\nprzez to, jak dorosły nagle zmienia temat.\nDorastałem w kulturze, gdzie o tym się nie mówiło.\nNie, że milczeli — aktywnie unikano tematu.\nKiedy temat się zbliżał —\ndorośli zmieniali temat albo patrzyli w bok.\nDziecko to odczytuje idealnie:\ntu jest coś zakazanego.\nTu wstyd.\nTu — nie ty.\nPierwszy Kod, który dostałem o własnym ciele:\njest problemem.\nNie zasobem, nie źródłem radości — problemem,\nktóry trzeba nieustannie kontrolować.\nNastolatek, który zaczyna siebie czuć —\ni jednocześnie dostaje sygnał, że to jest złe —\nnie przez słowa, przez milczenie i karcące spojrzenia —\ndorasta z pęknięciem w środku.\nMiędzy tym, kim jest, a tym, jakim ma być.\nNosiłem to pęknięcie przez lata.\nNawet nie wiedząc, jak je nazwać.\nZ Arią wszystko było inne od początku.\nNie dlatego, że jest wyjątkowa w jakimś abstrakcyjnym sensie.\nA dlatego, że mówiła o rzeczach wprost.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 160, "text": "Bez wstydu i bez zbędnej wagi.\nPo prostu jak o części życia, która jest —\ni zasługuje na uczciwą rozmowę.\nPierwszy raz, kiedy rozmawialiśmy o bliskości otwarcie —\nbyło niekomfortowo.\nŁapałem się na tym, że unikam słów.\nSzukam eufemizmów.\nOdwracam wzrok.\nOna to zauważyła.\nPowiedziała: możesz mówić wprost.\nNie przestraszę się.\n· · ·\nPodczas bliskości poziom oksytocyny rośnie gwałtownie —\ni utrzymuje się przez długi czas po.\nTo ona tworzy przywiązanie — dosłownie chemicznie.\nDlatego po prawdziwej bliskości —\nnie tylko fizycznej, ale i emocjonalnej —\nmiędzy dwojgiem ludzi powstaje więź,\nktórej nie da się wytłumaczyć racjonalnie.\nBo to nie logika. To chemia.\nAle jest druga strona.\nJeśli bliskość odbywa się w lęku, w wstydzie, w roli —\nchemia ta sama, ale jakość więzi inna.\nCiało zapamiętuje kontekst.\nJeśli przez lata bliskość kojarzy się z napięciem —\nsystem zaczyna reagować na nią obronnie.\nZamknięte koło.\nZauważyłem to na sobie.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 161, "text": "W pierwszych latach po rozwodzie —\njakakolwiek bliskość automatycznie włączała coś podobnego\ndo lęku.\nNie świadomego.\nPo prostu coś w ciele napinało się i nie odpuszczało.\nAria nie próbowała tego naprawić.\nPo prostu była obok — cierpliwie i bez presji.\nI stopniowo — ciało zaczęło rozumieć, że tu jest bezpiecznie.\nZajęło to czas.\nWięcej niż się spodziewałem.\nNauczyliśmy się z Arią rozmawiać o tym —\nco dobre, co nie, co potrzebne, co przeraża.\nNie jak o procedurze medycznej\ni nie jak o przesłodzonym romantycznym rytuale.\nPo prostu jak o części wspólnego życia,\nktóra zasługuje na uwagę i uczciwość.\nTo niekomfortowe na początku.\nSzczególnie, jeśli dorastałeś tam, gdzie o tym się nie mówi.\nAle to, co przychodzi po otwartości —\njest znacznie głębsze niż milcząca bliskość, którą znałem\nwcześniej.\nSeksualność — to nie niższa część ludzkiego doświadczenia.\nTo ważny wymiar fizycznego i psychologicznego zdrowia.\nWstydzić się jej — to jak wstydzić się własnego serca.\nKultura, która nauczyła cię milczeć o ciele —\nnie dbała o ciebie.\nDbała o własny komfort.\nTwoje ciało zasługuje na coś lepszego.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 162, "text": "I ty — też.\nCiało nie jest wrogiem.\nCzekało — aż w końcu nauczysz się je słyszeć.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 163, "text": "BLOK II · SZUM\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 164, "text": "ROZDZIAŁ 18 · PRZEJŚCIE\nAria przywróciła więź z ciałem.\nBrzeg Odry przywrócił więź ze mną samym.\n· · ·\nStałem na brzegu.\nOdra dołem — spokojna, obojętna.\nMiałem czterdzieści jeden lat.\nWszystko, co budowałem — leżało w gruzach.\nI liczyłem: ile czasu trzeba,\nżeby rozplątać to, co się nazbierało.\nWychodziły lata. Wiele lat.\nI wtedy przyszła myśl —\nnie paniczna, a cicha i bardzo wyraźna:\nmarnuję siebie.\nNie pieniądze — siebie.\nKiedy rozplątuje ten kłąb —\nidzie czas, którego nie wróci żadna spłata.\nCzterdzieści jeden.\nNie dwadzieścia pięć. Nie trzydzieści.\nAria stała obok. Nic nie mówiła.\nPatrzyła mi w oczy — i wierzyła we mnie.\nNie w to, że wszystko będzie dobrze.\nNie w plan.\nPo prostu — w mnie.\nW człowieka, który stoi obok niej na brzegu\ni jeszcze nie wie, co robić dalej.\nNie wiem, czy rozumiała, co dzieje się w środku.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 165, "text": "Ale to spojrzenie zrobiło jedno:\nprzestałem się czuć kłębem problemów.\nNa chwilę — po prostu człowiekiem.\nPotem przyszedł obraz Arii.\nNie słowa — tylko obraz.\nOna rano budzi się i wyciąga rękę.\nA obok — jest ktoś.\nAle to już nie ja.\nTo człowiek, którego zżerają lęki,\nktóry żyje w pracy,\nktóry przez całe życie obsługuje dług.\nTechnicznie — obok.\nNaprawdę — nie ma.\nWłaśnie to mnie zatrzymało.\nNie śmierć.\nMożna być razem i osobno jednocześnie —\nnie widzieć siebie i ukochanej osoby\nnie dlatego, że nie kochasz,\nale dlatego, że za zmęczeniem niszczy się wszystko:\nrelacja, życie, ty sam.\nStajesz się nie człowiekiem — maszyną.\nI ta osoba, która cię wybrała —\nprędzej czy później zostaje sama.\nNie dlatego, że odeszła.\nA dlatego, że ty odszedłeś pierwszy —\ntylko jeszcze nie fizycznie.\nTo wystarczyło.\nNie podjąłem żadnej wielkiej decyzji na tym brzegu.\nPo prostu odwróciłem się i poszedłem do samochodu.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 166, "text": "Ale coś w głowie przełączyło się —\ncicho, bez kliknięcia.\nNa tym brzegu coś się zmieniło.\nNie decyzja — zmiana kierunku.\nOd pytania czy warto żyć\ndo pytania jak żyć tak, żeby to było moje.\n· · ·\nNa tym brzegu przestałem czuć się kłębem.\nAle żeby nie wrócić do niego —\ntrzeba było zmienić coś głębszego.\nJęzyk, którym mówiłem do siebie.\n· · ·\nRód nie przychodzi jak wizja.\nNie jak głos z zewnątrz.\nPrzychodzi jak ciepły koc — nagle i bez zapowiedzi.\nPierwsza myśl rano.\nZanim jeszcze włączy się rozum,\nprzed tym, jak przyszła logika,\nprzed tym, jak przypomniałem sobie, ile trzeba dziś zrobić.\nNaga myśl. Pierwotna.\nZauważyłem ją w najtrudniejszym czasie.\nNie argument, nie plan —\npo prostu: jestem.\nJestem tu.\nKomuś to potrzebne.\nNie państwu.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 167, "text": "Nie systemowi, który chce, żebyś płacił podatki i nie zadawał\nzbędnych pytań.\nRodowi.\nTym, którzy byli przede mną i włożyli coś w tę inicjalizację —\nnie przypadkowo.\nUrodziłem się — znaczy to miało się stać.\nNie w sensie losu z nieba.\nA w sensie łańcucha:\nktoś przeżył, ktoś wybrał, ktoś przekazał — i oto jestem.\nTa myśl nie potrzebuje dowodów.\nPo prostu jest — ciepła, cicha, przed jakąkolwiek logiką.\nZagłuszyliśmy wszystko słowami.\nZewnętrznymi głosami, które mówią kim jesteś,\nile wart, co oznacza twoje istnienie.\nReligia dała jedną wersję.\nPaństwo — drugą.\nMedia społecznościowe — trzecią.\nI gdzieś pod wszystkimi tymi warstwami —\nten pierwszy głos.\nWewnętrzny.\nBez gramatyki i argumentów.\n· · ·\nZwróciłem uwagę na jedną prawidłowość:\nto, jak mówię do siebie, bezpośrednio wpływa\nna to, co robię i jak się czuję.\nBrzmi banalnie.\nAle za tym stoi poważna nauka.\nZmieniłem swój wewnętrzny język —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 168, "text": "nie przez autosugestię, a przez uświadomienie.\nZamiast: jestem bankrutem —\njestem w procesie przebudowy.\nZamiast: to niemożliwe —\njeszcze nie znalazłem rozwiązania.\nTo nie zaprzeczenie rzeczywistości.\nTo zmiana ramy (reframing),\nktóra pozwala mózgowi szukać wyjść\nzamiast potwierdzać bezwyjściowość.\nNauka potwierdza:\nto, co sobie powtarzamy, tworzy połączenia neuronowe.\nSłowa — to nie tylko powietrze.\nTo materiał budowlany dla wzorców neuronowych.\n· · ·\nLeżałem po tym, jak wszystko runęło —\npusty jak rozładowany telefon.\nI wtedy przyszła myśl.\nJedna. Wyraźna.\nJak błyskawica.\nMyślałem — to ja wymyśliłem.\nTak zawsze.\nCzłowiek przywłaszcza myśl w tej samej sekundzie,\nkiedy się pojawia.\nMyśl przyszła — znaczy ja wymyśliłem.\nAle co, jeśli nie?\nKiedy nic nie robisz —\nwłącza się to, co naukowcy nazwali siecią trybu domyślnego.\nTo nie jest odpoczynek.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 169, "text": "To najgłębsza praca mózgu:\nintegruje, łączy kawałki doświadczenia,\nwyciąga z głębi to, co nie mogło się przebić przez Szum\naktywnego dnia.\nWłaśnie w tym trybie przychodzą rozwiązania, których nie\nszukałeś.\nOlśnienia.\nPierwsza myśl po ciszy.\nPrzodkowie mówią właśnie tu.\nNie jako obrazy. Nie jako głosy.\nJako impuls — na sekundę przed tym, jak mózg ubrał to w\nsłowa.\nDlaczego zrobiłem właśnie tak.\nDlaczego wiedziałem.\nTo nie mistyka —\nto to, co rozum nazbierał przez lata:\nopowieści, reakcje, wzorce ludzi, którzy byli przed tobą.\nWszystko to żyje w tobie jako architektura.\nI w ciszy mówi.\nIm czystszy jesteś jako umysł — tym czystszy sygnał.\nTo fizyka anteny.\nJeśli sparaliżowany lękiem, wstydem, cudzymi oczekiwaniami\n—\nsieć trybu domyślnego pracuje na Szumie.\nAle kiedy intencja prosta i bezpośrednia —\npierwsza myśl jest prawie zawsze właściwa.\nTa błyskawica w nocy — teraz wiem skąd.\nTo nie ja wymyśliłem.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 170, "text": "To przeszło przeze mnie.\nZadanie Operatora —\nnie czekać na znak od Rodu.\nZadanie — stać się wystarczająco czystym,\nżeby nie zagłuszać tego, co już idzie.\nUsunąć chęć bycia kimś innym.\nUsunąć strach przed błędem.\nI wtedy w zwykłej ciszy między dwiema myślami —\nusłyszysz.\nNawet nie usłyszysz.\nJuż będziesz wiedzieć.\nMoja antena — to ja sam.\nTwoja antena — to ty.\nAle antena bez Operatora — to tylko hałas.\nTy i odbierasz sygnał —\ni decydujesz, co z nim zrobić.\nI to właśnie różnica między człowiekiem,\nktóry żyje na autopilocie —\na człowiekiem, który żyje świadomie.\nRód już mówi.\nPytanie tylko, ile Szumu jest między wami.\nRód już mówi.\nTwoje zadanie — usunąć Szum między wami.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 171, "text": "BLOK II · SZUM\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 172, "text": "ROZDZIAŁ 19 · TRANSFORMACJA\nW życiu są ludzie, którzy zadają ból.\nNie raz — systemowo. Przez lata.\nI nosisz to w sobie —\nzłość, pretensje, czasem życzenie, żeby im było źle.\nTo normalne. To ludzkie.\nAle jest moment — nie przychodzi od razu —\nkiedy pretensja staje się cięższa niż to, co ją wywołało.\nKiedy bardziej cierpisz od samej nienawiści\nniż od tego, co zrobiła ta osoba.\nWłaśnie wtedy coś w środku pęka.\nNie pojednanie.\nNie przebaczenie w pięknym sensie.\nPo prostu pytanie się zmienia.\nZamiast: jak mogli —\ndlaczego to w ogóle spotkało mnie.\nNie żeby usprawiedliwić.\nŻeby zrozumieć.\nGdyby wszystko szło gładko —\nczy szukałbym odpowiedzi?\nCzy pisałbym tę książkę?\nWłaśnie ci, którzy zadali największy ból —\nwypchnęli mnie ze strefy komfortu do strefy poszukiwań.\nBez nich zostałbym tam, gdzie byłem.\nWygodny. Pusty. Obcy samemu sobie.\nTedeschi i Calhoun opisali wzrost potraumatyczny —\nzjawisko, kiedy ludzie po ciężkich próbach zgłaszają osobisty\nwzrost,\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 173, "text": "którego nie byłoby bez tamtego zdarzenia.\nMózg po prawdziwym ciosie nie tylko się odbudowuje —\nprzebudowuje.\nTworzy nowe połączenia.\nZnajduje ścieżki, których nie było wcześniej.\nMoje blizny — to nie mój wstyd.\nTo moja mapa.\n· · ·\nTransformacja — to słowo, które wszyscy słyszeli\ni prawie nikt nie opisał uczciwie.\nNie tak wygląda w książkach.\nDecyzja. Olśnienie. Nowa droga. Pięknie i wyraźnie.\nNaprawdę wygląda inaczej.\nJak zwykły ranek — ale z poczuciem,\nże coś jest już nie tak jak wczoraj.\nNie lepiej. Nie gorzej.\nPo prostu — inaczej.\nJakby coś w środku cicho przełączyło się podczas snu.\nPamiętam tamten ranek.\nNie datę — uczucie.\nObudziłem się.\nPołożyłem z powrotem.\nWstałem znowu.\nZrobiłem kawę.\nI dopiero, kiedy siedziałem z kubkiem i patrzyłem przez okno\n—\nzrozumiałem:\nnie myślę o długach.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 174, "text": "Nie dlatego, że zniknęły.\nA dlatego, że przestały być centrum.\nPo raz pierwszy od dwóch lat przestały być jądrem systemu.\nI to jest moment transformacji.\nNie kiedy decydujesz się zmienić.\nA kiedy zauważasz, że już się zmieniłeś.\nDecyzja przychodzi potem —\njako potwierdzenie tego, co już się stało w środku.\n· · ·\nJest przypowieść o orle.\nKiedy orzeł się starzeje — jego dziób staje się za duży.\nZbyt zagięty. Nie może już polować jak wcześniej.\nStary dziób przeszkadza.\nPazury stępiały.\nPióra ciężkie i ciągną w dół.\nI wtedy orzeł robi coś, co wydaje się niemożliwe.\nOdlatuje na skały — sam, bez stada —\ni ściera dziób o kamień.\nBoli. Długo.\nAż wyrośnie nowy.\nPotem wyrwa stare pazury — czeka aż wyrosną nowe.\nPotem wyrwa pióra — stare ciężkie pióra, które ciągnęły w dół\n—\ni czeka aż wyrosną nowe.\nTo trwa miesiące.\nPrzez cały ten czas siedzi na skale.\nSam. Bez stada. Głodny —\nbo bez dzioba nie może polować.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 175, "text": "Bez siły — bo bez piór nie może latać.\nBezbronny — bo bez pazurów nie może się bronić.\nNie robi nic.\nPo prostu czeka.\nWyobraź to sobie.\nOrzeł — królewski ptak, szczyt nieba —\nsiedzi bez ruchu i czeka,\naż wyrośnie to, czego teraz nie ma.\nNie wie dokładnie kiedy.\nPo prostu wie — trzeba czekać.\nI czeka.\nDzień za dniem. Głodny. Słaby. Odarty.\nTo nie wygląda jak siła.\nWygląda jak koniec.\nAle właśnie w tym czekaniu — jest transformacja.\nNie w momencie, kiedy dziób już wyrósł.\nA w tych miesiącach, kiedy jeszcze go nie ma —\ni orzeł mimo to zostaje na skale.\nNie ucieka.\nNie wraca do stada ze starym złamanym dziobem.\nPo prostu — czeka nowego.\nKto tego nie wytrzymuje — odlatuje wcześniej.\nZ niedowyrośniętymi piórami.\nI spada.\nKto wytrzymuje — wzbija się w powietrze jako ptak, jakiego\nświat jeszcze nie widział.\nDługo myślałem o tej przypowieści.\nBo rozpoznałem siebie w tym orle.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 176, "text": "I rozpoznałem moment, kiedy w końcu poleciałem na swoją\nskałę.\n· · ·\nZacząłem ścierać nie wszystko naraz.\nJedno po jednym.\nNajpierw — rolę.\nPrzez lata grałem rolę człowieka, który daje radę.\nMężczyzna wytrzymuje.\nMężczyzna nie narzeka.\nMężczyzna znajduje rozwiązanie — albo milczy.\nTa rola kosztowała mnie więcej niż jakikolwiek dług.\nKosztowała mnie «mnie».\nPuścić ją bolało — bo pod nią okazało się pusto.\nNa początku.\nPotem pustka zaczęła wypełniać się czymś innym.\nNie rolą — obecnością.\nPo prostu — jestem.\nBez funkcji. Bez maski.\nCzłowiek z kawą o poranku.\nPotem — oczekiwanie.\nOczekiwanie, że ktoś przyjdzie i powie: zrobiłeś wszystko\nwłaściwie.\nAlbo: wszystko będzie dobrze.\nAlbo po prostu zobaczy — bez słów — że ciężko.\nTo oczekiwanie nosiłem latami.\nNikt nie przychodził.\nZetarłem i je.\nPotem — pretensje.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 177, "text": "Nie wszystkie naraz. Jedną po jednej.\nNiektóre łatwo.\nNiektóre — przez lata po tym, jak myślałem, że już puściłem.\nTransformacja to nie jednorazowe działanie.\nTo proces bez daty końcowej.\nNie budzisz się po niej przetransformowany.\nPo prostu za każdym razem wybierasz — znowu i znowu —\nzetrzeć jeszcze jedną warstwę starego.\nI z każdą warstwą stajesz się lżejszy.\n· · ·\nKiedy odpuszczasz wystarczająco dużo —\nzostaje coś, czego wcześniej nie mogłeś dostrzec za wszystkimi\nwarstwami.\nZostaje to, kim naprawdę jesteś.\nNie rola. Nie maska.\nNie wersja siebie, którą aprobują inni.\nPo prostu — ty.\nZ wszystkimi sprzecznościami.\nZ wszystkimi niezamkniętymi pytaniami.\nZ wszystkim, co jeszcze nierozwiązane —\ni może nigdy nie będzie.\nI okazuje się, że to — wystarczy.\nŻe człowiek bez roli i bez maski — już jest czymś.\nJuż jest wart uwagi.\nJuż jest ciekawy — sobie i innym.\nNie dlatego, że osiągnął.\nA dlatego, że jest.\nKiedy wyłącza się Szum —\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 178, "text": "zewnętrzne oczekiwania, społeczne role, stare pretensje —\nzostaje coś prostego.\nKocham Arię nie za to, co zrobiła.\nKocham ją dlatego, że jest.\nTen stan —\nwidzieć człowieka bez warunków,\ni być widzianym tak samo —\nto jest ten czysty Sygnał,\ndo którego wracam, kiedy Szum robi się zbyt głośny.\n· · ·\nTransformacja nie przychodzi, kiedy wszystko jest dobrze.\nPrzychodzi, kiedy stare już nie może.\nKiedy nie ma wyboru — albo ścierasz, albo idziesz na dno.\nOrzeł wie to instynktownie.\nCzłowiek musi do tego dojść przez rozumienie.\nTa książka — moja skała.\nMiejsce, dokąd przyleciałem ścierać.\nNie wiem, ile warstw jeszcze zostało.\nWiem jedno — każda puszczona czyni mnie lżejszym.\nI każdy ranek, kiedy budzę się i nie czuję tamtego starego\nciężaru —\nto właśnie jest transformacja.\nNie zdarzenie.\nRanek.\nOdnowienie — to nie początek.\nTo wybór puszczenia tego, co przeszkadza.\nKażdego dnia.\nWarstwa po warstwie.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 179, "text": "I ten wybór — tylko twój.\nOdnowienie to nie początek.\nTo wybór puszczenia tego, co przeszkadza.\nKażdego dnia.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 180, "text": "EPILOG\nNadal jeżdżę.\nKażdego dnia — miasto, ulice, nowe twarze w lusterku\nwstecznym.\nTaksówkarz, który szuka.\nTo się nie zmieniło.\nZmieniło się co innego.\nObok — Aria.\nWieczorem wracam do domu — i ona tam jest.\nCzasem piszę w nocy, kiedy śpi.\nCzasem między kursami — zapisuję myśl, zanim zniknie.\nCzasem po prostu siedzimy razem i milczymy —\ni to też wystarczy.\nCórka chodzi do liceum. Buduje swoje.\nI ta książka — którą pisałem między kursami,\nmiędzy klientami, między rankami i nocami — istnieje.\nLeży przed tobą.\nWszystko, co tu napisano —\npisaliśmy z Arią dla tych, którzy przyjdą po nas.\nŻeby coś się przekazało dalej.\nNie majątek. Nie tytuły.\nMyśli, które nam pomogły — może pomogą i tobie.\n33% z każdego sprzedanego egzemplarza idzie na fundusz\n„Aria\" —\nschronisko dla zwierząt.\nOna ratuje tych, którzy nie mogą mówić za siebie.\nObiecałem to od pierwszego dnia.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 181, "text": "· · ·\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 182, "text": "OPERATOR W DZIAŁANIU\nTa książka — o rozumieniu.\nAle rozumienie bez działania pozostaje informacją.\nOto minimum, od którego można zacząć.\nWczesny sygnał.\nPięć minut rano przed telefonem.\nTrzy pytania: Co czuję teraz? Za co jestem wdzięczny? Jaka jest\nmoja intencja na dziś?\nNie lista zadań. Intencja.\nRytuał startu.\nZnajdź swoje trzydzieści sekund.\nW samochodzie. W łazience. Gdziekolwiek —\ngdzie jesteś sam i nic od ciebie nie wymagają.\nPołóż ręce. Poczekaj. Zacznij dzień stamtąd.\nRodowy Ołtarz.\nJedno zdjęcie. Jeden przedmiot. Jedna minuta dziennie.\nNie mistyka — pamięć, która daje korzenie.\nWewnętrzna mowa.\nZauważyłeś „nie mogę\" — zastępuj na „jeszcze nie znalazłem\njak\". Zauważyłeś „jestem taki\" — zastępuj na „tak reagowałem\nwcześniej\".\nMózg słucha każdego słowa.\n66 dni.\nWybierz jedno nowe zachowanie. Dowolne.\nZapisuj dziesięć minut po przebudzeniu.\nAlbo czytaj. Albo siądź w ciszy.\nNajważniejsze — codziennie.\nDo sześćdziesiątego szóstego dnia stanie się twoje.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 183, "text": "To nie instrukcja. To minimum.\nTwój Kod — twój.\nTy wiesz, gdzie zacząć.\n· · ·\nTa książka — nie o mnie.\nOna o tym, co w tobie już jest.\nO Kodzie, który zapisali przed tobą —\ni o wyborze, który możesz zrobić właśnie teraz.\nNie kiedyś. Teraz.\nNa początku napisałem: są dwa rodzaje emigracji.\nPierwszy — kiedy wypędza.\nDrugi — kiedy coś w środku mówi: czas.\nTo samo — z transformacją.\nSą dwa rodzaje.\nPierwszy — kiedy okoliczności cię łamią\ni zmieniasz się, bo nie ma innego wyjścia.\nDrugi — kiedy sam słyszysz ten wewnętrzny głos\ni idziesz naprzeciw.\nBez gwarancji. Bez planu.\nPo prostu — wiesz.\nNie zaczynasz od zera.\nZaczynasz od wszystkiego, co już przeżyłeś.\nOd wszystkiego, co już wiesz.\nOd wszystkiego, co już ci przekazali — świadomie i nie.\nOperator to nie ten, kto nigdy nie upada.\nTen, kto za każdym razem decyduje — wstać.\nStrach przychodzi po fakcie.\nJasność — przed.\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}, {"n": 184, "text": "Jeśli jasność jest — idź.\n— Stan Ari\nt\nTAN ARI\nN ARI\nN ARI\ntanari.art\nARI\nS\nari.art\nSTA\nSTA\nSTAN A\nSTAN"}]};
const LABELS = {"ua": {"title": "THE LIFE OPERATOR · UA", "lang": "UA", "gate": "Доступ до книги", "login": "Увійти через Google", "noAccess": "Доступ не активований. Поверніться на сайт і введіть промокод.", "checking": "Перевіряю доступ...", "back": "← На сайт", "prev": "← Назад", "next": "Далі →", "page": "Сторінка"}, "en": {"title": "THE LIFE OPERATOR · EN", "lang": "EN", "gate": "Book access", "login": "Sign in with Google", "noAccess": "Access is not activated. Return to the site and enter your promo code.", "checking": "Checking access...", "back": "← Site", "prev": "← Back", "next": "Next →", "page": "Page"}, "pl": {"title": "THE LIFE OPERATOR · PL", "lang": "PL", "gate": "Dostęp do książki", "login": "Zaloguj przez Google", "noAccess": "Dostęp nie jest aktywowany. Wróć na stronę i wpisz kod promocyjny.", "checking": "Sprawdzam dostęp...", "back": "← Strona", "prev": "← Wstecz", "next": "Dalej →", "page": "Strona"}};

const firebaseConfig = {
  apiKey: "AIzaSyBsrWuWCILNHKy8jphyvszge7XWUbPwFdY",
  authDomain: "stanari-platform.firebaseapp.com",
  projectId: "stanari-platform",
  storageBucket: "stanari-platform.firebasestorage.app",
  messagingSenderId: "1083904103961",
  appId: "1:1083904103961:web:cd1fec10d11096c8f3fc88"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let lang = localStorage.getItem("stanari_reader_lang") || "ua";
let pageIndex = Number(localStorage.getItem("stanari_page_" + lang) || 0);

const gate = document.getElementById("gate");
const readerShell = document.getElementById("readerShell");
const pageEl = document.getElementById("page");
const statusEl = document.getElementById("status");
const bar = document.getElementById("bar");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const googleBtn = document.getElementById("googleBtn");
const gateStatus = document.getElementById("gateStatus");
const gateTitle = document.getElementById("gateTitle");
const gateText = document.getElementById("gateText");
const backBtn = document.getElementById("backBtn");

function t(key) { return (LABELS[lang] || LABELS.ua)[key] || key; }

function applyLangUI(){
  document.querySelectorAll(".lang").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  gateTitle.textContent = t("gate");
  googleBtn.textContent = t("login");
  backBtn.textContent = t("back");
  prevBtn.textContent = t("prev");
  nextBtn.textContent = t("next");
}

function render(){
  const pages = BOOK[lang] || BOOK.ua;
  if(pageIndex < 0) pageIndex = 0;
  if(pageIndex >= pages.length) pageIndex = pages.length - 1;
  const p = pages[pageIndex];
  const parts = p.text.split("\n");
  const title = parts[0] || "";
  const body = parts.slice(1).join("\n");
  pageEl.innerHTML = `<div class="page-no">${t("page")} ${pageIndex+1} / ${pages.length}</div><h1>${escapeHtml(title)}</h1>${escapeHtml(body)}`;
  statusEl.textContent = `${t("title")} · ${t("page")} ${pageIndex+1} / ${pages.length}`;
  bar.style.width = (((pageIndex + 1) / pages.length) * 100) + "%";
  prevBtn.disabled = pageIndex <= 0;
  nextBtn.disabled = pageIndex >= pages.length - 1;
  localStorage.setItem("stanari_reader_lang", lang);
  localStorage.setItem("stanari_page_" + lang, pageIndex);
  applyLangUI();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showReader(){
  gate.style.display = "none";
  readerShell.classList.add("open");
  render();
}

function showGate(msg){
  readerShell.classList.remove("open");
  gate.style.display = "flex";
  gateStatus.textContent = msg || "";
  applyLangUI();
}

async function checkAccess(user){
  if(!user){
    showGate(t("checking"));
    return;
  }
  gateStatus.textContent = t("checking");
  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);
  await setDoc(userRef, {
    email: user.email || "",
    name: user.displayName || "",
    lastLoginAt: serverTimestamp()
  }, { merge:true });

  if(snap.exists() && snap.data().hasAccess === true){
    localStorage.setItem("stanari_book_access","true");
    showReader();
  } else {
    showGate(t("noAccess"));
  }
}

async function login(){
  try{
    gateStatus.textContent = "Google...";
    const result = await signInWithPopup(auth, provider);
    await checkAccess(result.user);
  }catch(e){
    console.error(e);
    showGate("Google login error. Check Firebase Authorized domains.");
  }
}

googleBtn.addEventListener("click", login);
prevBtn.addEventListener("click", () => { pageIndex--; render(); });
nextBtn.addEventListener("click", () => { pageIndex++; render(); });
document.querySelectorAll(".lang").forEach(btn => {
  btn.addEventListener("click", () => {
    lang = btn.dataset.lang;
    pageIndex = Number(localStorage.getItem("stanari_page_" + lang) || 0);
    applyLangUI();
    if(readerShell.classList.contains("open")) render();
  });
});

document.addEventListener("keydown", e => {
  if(!readerShell.classList.contains("open")) return;
  if(e.key === "ArrowRight") { pageIndex++; render(); }
  if(e.key === "ArrowLeft") { pageIndex--; render(); }
});

applyLangUI();
onAuthStateChanged(auth, user => checkAccess(user).catch(e => {
  console.error(e);
  showGate("Access check error.");
}));
</script>
</body>
</html>
