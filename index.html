<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAN ARI</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b0f;
  color:white;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h2 {
  margin-bottom:20px;
}

.music-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.music-card {
  background:rgba(255,255,255,0.03);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.05);
}

.tag {
  font-size:12px;
  opacity:0.6;
  margin-bottom:10px;
}

.author {
  font-size:14px;
  opacity:0.6;
  margin-bottom:10px;
}

audio {
  width:100%;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-top:40px;
}

.card img {
  width:100%;
  border-radius:16px;
}

/* === STAN ARI ACCESS BUTTON FIX === */
.stanari-read-access-fixed {
  position: fixed;
  right: 22px;
  bottom: 84px;
  z-index: 9998;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-height: 52px;
  padding: 0 22px;
  border: 1px solid rgba(255, 226, 160, .35);
  border-radius: 999px;
  background: linear-gradient(135deg, #ffe7ab, #d8af63, #b8832e);
  color: #130d06;
  font-weight: 900;
  font-family: Georgia, serif;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 16px 45px rgba(216,175,99,.24);
}
.stanari-read-access-fixed:hover {
  transform: translateY(-1px);
}
@media (max-width: 640px) {
  .stanari-read-access-fixed {
    left: 14px;
    right: 14px;
    bottom: 78px;
    width: auto;
  }
}
/* === /STAN ARI ACCESS BUTTON FIX === */

</style>
</head>

<body>

<div class="container">

<h2>Пісні</h2>

<div class="music-grid">

<div class="music-card">
  <div class="tag">МУЗИКА</div>
  <h3>Я прокидався — ніби не свій</h3>
  <div class="author">STAN ARI</div>
  <audio controls src="audio/ya-prokidavsya.mp3"></audio>
</div>

<div class="music-card">
  <div class="tag">МУЗИКА</div>
  <h3>The Mirror</h3>
  <div class="author">STAN ARI</div>
  <audio controls src="audio/the-mirror.mp3"></audio>
</div>

<div class="music-card">
  <div class="tag">МУЗИКА</div>
  <h3>Чорне Сонце</h3>
  <div class="author">ARIA</div>
  <audio controls src="audio/chorne-sonce.mp3"></audio>
</div>

</div>

<h2>Ілюстрації</h2>

<div class="grid">
  <div class="card"><img src="img1.jpg"></div>
  <div class="card"><img src="img2.jpg"></div>
  <div class="card"><img src="img3.jpg"></div>
</div>

</div>


<!-- STAN ARI ACCESS BUTTON FIX -->
<button class="stanari-read-access-fixed" onclick="stanariOpenAccessFunnel()">📖 Читати безкоштовно</button>
<!-- /STAN ARI ACCESS BUTTON FIX -->


<script>
function stanariOpenAccessFunnel() {
  if (typeof openAccessModal === "function") {
    openAccessModal();
    return;
  }
  if (typeof openAccess === "function") {
    openAccess();
    return;
  }

  const ids = ["accessModal", "loginModal", "promoModal"];
  for (const id of ids) {
    const el = document.getElementById(id);
    if (el) {
      el.style.display = "flex";
      el.classList.add("open", "show");
      return;
    }
  }

  // If separate access page exists, go there as fallback
  window.location.href = "access.html";
}
</script>

</body>
</html>
